<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>策略思維 × 創新創業工作坊 · Vincent</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#111118;--ink:#f0f0f5;--mid:rgba(240,240,245,.55);
  --line:rgba(255,255,255,.08);
  --orange:#FF6B00;--red:#FF2055;--blue:#3B82F6;--purple:#A855F7;
  --green:#22C55E;--yellow:#FBBF24;--cyan:#06B6D4;
  --ease-back:cubic-bezier(0.34,1.56,0.64,1);
  --ease-smooth:cubic-bezier(0.4,0.0,0.2,1);
  /* 最小字體規範 */
  --min-font:clamp(1rem,1.4vw,1.2rem);
  --min-label:clamp(0.88rem,1.25vw,1rem);
}
html{font-size:20px}
body{font-family:system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--ink);overflow:hidden;width:100vw;height:100vh}
#slides-container{height:100vh;width:100vw;overflow-y:scroll;scroll-snap-type:y mandatory;scroll-behavior:smooth;position:fixed;inset:0;scrollbar-width:none}
#slides-container::-webkit-scrollbar{display:none}
.slide{height:100vh;width:100%;scroll-snap-align:start;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:clamp(2rem,4vw,4rem) clamp(2rem,5vw,5rem) 68px}
.slide[data-sec="1"]{background:linear-gradient(165deg,#1c1130 0%,#241535 35%,#2c1628 70%,#1e1020 100%)}
.slide[data-sec="2"]{background:linear-gradient(165deg,#0c1830 0%,#112240 35%,#142848 70%,#0c1828 100%)}
.slide[data-sec="3"]{background:linear-gradient(165deg,#0c201a 0%,#102818 35%,#143020 70%,#0c1e14 100%)}
.slide[data-sec="4"]{background:linear-gradient(165deg,#201808 0%,#281e08 35%,#221c10 70%,#180e08 100%)}
.slide[data-sec="5"]{background:linear-gradient(165deg,#16102a 0%,#1e1438 35%,#221840 70%,#14102a 100%)}
.slide::before{content:'';position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:clamp(40px,6vw,72px) clamp(40px,6vw,72px);z-index:0}
.slide::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:0}
.slide[data-sec="1"]::after{background:radial-gradient(ellipse 70% 60% at 15% 15%,rgba(255,32,85,.08),transparent 55%),radial-gradient(ellipse 55% 70% at 85% 85%,rgba(168,85,247,.07),transparent 55%),radial-gradient(ellipse 40% 40% at 50% 50%,rgba(255,107,0,.04),transparent 50%)}
.slide[data-sec="2"]::after{background:radial-gradient(ellipse 70% 60% at 20% 20%,rgba(59,130,246,.08),transparent 55%),radial-gradient(ellipse 55% 70% at 80% 80%,rgba(255,32,85,.06),transparent 55%),radial-gradient(ellipse 45% 45% at 60% 40%,rgba(6,182,212,.05),transparent 50%)}
.slide[data-sec="3"]::after{background:radial-gradient(ellipse 70% 60% at 15% 15%,rgba(34,197,94,.08),transparent 55%),radial-gradient(ellipse 55% 70% at 85% 85%,rgba(6,182,212,.06),transparent 55%),radial-gradient(ellipse 40% 40% at 40% 60%,rgba(251,191,36,.04),transparent 50%)}
.slide[data-sec="4"]::after{background:radial-gradient(ellipse 70% 60% at 20% 20%,rgba(251,191,36,.09),transparent 55%),radial-gradient(ellipse 55% 70% at 80% 80%,rgba(168,85,247,.06),transparent 55%),radial-gradient(ellipse 45% 45% at 55% 45%,rgba(255,107,0,.05),transparent 50%)}
.slide[data-sec="5"]::after{background:radial-gradient(ellipse 70% 60% at 15% 15%,rgba(168,85,247,.1),transparent 55%),radial-gradient(ellipse 55% 70% at 85% 85%,rgba(255,107,0,.07),transparent 55%),radial-gradient(ellipse 40% 40% at 50% 50%,rgba(59,130,246,.05),transparent 50%)}

/* ── LIGHT THEME OVERRIDES ─────────────────────────────────────── */
.slide[data-theme="light"]{background:linear-gradient(160deg,#f9f8f5 0%,#f4f2ed 50%,#ede9e2 100%)!important;--ink:#1a1825;--mid:rgba(26,24,37,.6)}
.slide[data-theme="light"]::before{background-image:linear-gradient(rgba(0,0,0,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.025) 1px,transparent 1px)}
.slide[data-theme="light"]::after{display:none}
.slide[data-theme="warm"]{background:linear-gradient(160deg,#fffbf4 0%,#fff8ec 50%,#fef3e2 100%)!important;--ink:#1c1812;--mid:rgba(28,24,18,.55)}
.slide[data-theme="warm"]::before{background-image:linear-gradient(rgba(0,0,0,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.02) 1px,transparent 1px)}
.slide[data-theme="warm"]::after{display:none}
.slide[data-theme="blue-light"]{background:linear-gradient(160deg,#f0f5ff 0%,#e8f0fe 50%,#dce9fd 100%)!important;--ink:#0f1e45;--mid:rgba(15,30,69,.55)}
.slide[data-theme="blue-light"]::before{background-image:linear-gradient(rgba(0,0,0,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.02) 1px,transparent 1px)}
.slide[data-theme="blue-light"]::after{display:none}
.slide[data-theme="green-light"]{background:linear-gradient(160deg,#f0faf5 0%,#e8f7f0 50%,#ddf2ea 100%)!important;--ink:#0c2018;--mid:rgba(12,32,24,.55)}
.slide[data-theme="green-light"]::before{background-image:linear-gradient(rgba(0,0,0,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.02) 1px,transparent 1px)}
.slide[data-theme="green-light"]::after{display:none}
/* Light theme chip overrides */
.slide[data-theme="light"] .chip,.slide[data-theme="warm"] .chip,.slide[data-theme="blue-light"] .chip,.slide[data-theme="green-light"] .chip{filter:saturate(1.2)}
/* Light theme text corrections */
.slide[data-theme="light"] p,.slide[data-theme="warm"] p,.slide[data-theme="blue-light"] p,.slide[data-theme="green-light"] p{color:var(--mid)}
.slide[data-theme="light"] h1,.slide[data-theme="light"] h2,.slide[data-theme="light"] h3,
.slide[data-theme="warm"] h1,.slide[data-theme="warm"] h2,.slide[data-theme="warm"] h3,
.slide[data-theme="blue-light"] h1,.slide[data-theme="blue-light"] h2,.slide[data-theme="blue-light"] h3,
.slide[data-theme="green-light"] h1,.slide[data-theme="green-light"] h2,.slide[data-theme="green-light"] h3{color:var(--ink)}
/* Light theme card backgrounds */
.slide[data-theme="light"] .unlock-card .card-mask,.slide[data-theme="warm"] .unlock-card .card-mask{background:rgba(0,0,0,.06);border-color:rgba(0,0,0,.12)}
.slide[data-theme="light"] .unlock-card .card-mask-q,.slide[data-theme="warm"] .unlock-card .card-mask-q{color:rgba(0,0,0,.55)}
.slide[data-theme="light"] .unlock-card .card-mask-num,.slide[data-theme="warm"] .unlock-card .card-mask-num{color:rgba(0,0,0,.2)}
.slide[data-theme="light"] .tip-box,.slide[data-theme="warm"] .tip-box{background:rgba(255,107,0,.08);border-color:var(--orange)}

.inner{position:relative;z-index:2;width:min(96vw,1400px);max-height:calc(100vh - 120px);overflow:hidden;scrollbar-width:none}
.inner::-webkit-scrollbar{display:none}
.slide-content{opacity:0;transform:translateY(32px) scale(.97);transition:opacity .6s var(--ease-smooth),transform .6s var(--ease-back)}
.slide.is-visible .slide-content{opacity:1;transform:none}
.slide.is-visible .slide-content>*{animation:fade-up .5s var(--ease-back) both}
.slide.is-visible .slide-content>*:nth-child(1){animation-delay:.04s}
.slide.is-visible .slide-content>*:nth-child(2){animation-delay:.10s}
.slide.is-visible .slide-content>*:nth-child(3){animation-delay:.16s}
.slide.is-visible .slide-content>*:nth-child(4){animation-delay:.22s}
.slide.is-visible .slide-content>*:nth-child(5){animation-delay:.28s}
.slide.is-visible .slide-content>*:nth-child(6){animation-delay:.34s}
.slide.is-visible .slide-content>*:nth-child(7){animation-delay:.40s}
@keyframes fade-up{from{opacity:0;transform:translateY(22px) scale(.98)}to{opacity:1;transform:none}}
@keyframes aurora{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes lock-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(300%)}}
@keyframes carousel-slide{0%,20%{opacity:1}25%,95%{opacity:0}100%{opacity:1}}

/* 照片輪播 */
.carousel-wrap{position:relative;width:min(520px,85vw);aspect-ratio:16/10;border-radius:16px;overflow:hidden;border:2px solid rgba(255,255,255,.12);box-shadow:0 20px 60px rgba(0,0,0,.5)}
.carousel-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1s ease}
.carousel-wrap img.active{opacity:1}
.carousel-dots{display:flex;gap:.5rem;margin-top:.8rem}
.carousel-dots span{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer;transition:all .3s}
.carousel-dots span.active{background:var(--orange);transform:scale(1.2)}

/* CHIP */
.chip{display:inline-flex;align-items:center;gap:.4rem;font-size:.62rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;padding:.28em .85em;border-radius:999px;border:1px solid;margin-bottom:.85rem;width:fit-content;white-space:nowrap}
.chip.chip-lg{font-size:.95rem;padding:.32em 1.1em;letter-spacing:.1em}
.chip-orange{color:var(--orange);border-color:rgba(255,107,0,.4);background:rgba(255,107,0,.1)}
.chip-red{color:var(--red);border-color:rgba(255,32,85,.4);background:rgba(255,32,85,.1)}
.chip-blue{color:var(--blue);border-color:rgba(59,130,246,.4);background:rgba(59,130,246,.1)}
.chip-purple{color:var(--purple);border-color:rgba(168,85,247,.4);background:rgba(168,85,247,.1)}
.chip-green{color:var(--green);border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.1)}
.chip-yellow{color:var(--yellow);border-color:rgba(251,191,36,.4);background:rgba(251,191,36,.1)}
.chip-cyan{color:var(--cyan);border-color:rgba(6,182,212,.4);background:rgba(6,182,212,.1)}
.chip-white{color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.06)}

/* TYPOGRAPHY */
.hero-txt{font-size:clamp(3.5rem,10vw,8rem);font-weight:800;line-height:1.0;letter-spacing:-0.035em}
h1{font-size:clamp(2.4rem,6.5vw,5.5rem);font-weight:800;line-height:1.04;letter-spacing:-0.03em}
h2{font-size:clamp(1.6rem,3.6vw,3rem);font-weight:700;line-height:1.08;letter-spacing:-0.02em;text-wrap:balance}
h3{font-size:clamp(1rem,1.8vw,1.6rem);font-weight:600;line-height:1.2;text-wrap:balance}
p,li{font-size:clamp(.9rem,1.45vw,1.15rem);line-height:1.75;color:var(--mid);text-wrap:pretty}
strong{color:var(--ink);font-weight:700}
.g-orange{background:linear-gradient(135deg,#FF6B00,#FF9A00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.g-red{background:linear-gradient(135deg,#FF2055,#FF6080);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.g-blue{background:linear-gradient(135deg,#3B82F6,#60A5FA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.g-purple{background:linear-gradient(135deg,#A855F7,#C084FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.g-green{background:linear-gradient(135deg,#22C55E,#4ADE80);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.g-cyan{background:linear-gradient(135deg,#06B6D4,#22D3EE);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.g-multi{background:linear-gradient(135deg,#FF6B00,#FF2055,#A855F7,#3B82F6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* UTIL */
.bar{width:2.8rem;height:3px;background:linear-gradient(90deg,var(--orange),var(--red));border-radius:2px;margin:.6rem 0 1rem}
.deck-list{list-style:none;margin-top:.85rem;display:flex;flex-direction:column;gap:.5rem}
.deck-list li{padding:.1rem 0 .1rem 1.5rem;position:relative;font-size:clamp(.9rem,1.45vw,1.1rem);color:var(--mid)}
.deck-list li::before{content:'▸';position:absolute;left:0;color:var(--orange);font-weight:800}
.tip-box{margin-top:1rem;padding:.8rem 1.2rem;border-left:3px solid var(--orange);border-radius:0 8px 8px 0;background:rgba(255,107,0,.08);font-size:clamp(.85rem,1.25vw,.98rem);color:var(--ink);font-weight:500}
.body-content p{margin-bottom:.3rem;color:var(--mid)}
svg{overflow:visible}

/* ORIGINAL SINGLE REVEAL */
.reveal-wrap{position:relative;margin-top:1.2rem;border-radius:14px;overflow:hidden;cursor:pointer;user-select:none}
.reveal-answer{background:linear-gradient(135deg,#1a0f2e,#0d1a2e);border:1.5px solid rgba(168,85,247,.3);border-radius:14px;padding:1.8rem 2.2rem;font-size:clamp(.95rem,1.5vw,1.1rem);line-height:1.75;color:rgba(255,255,255,.85)}
.reveal-lock{position:absolute;inset:0;border-radius:14px;background:linear-gradient(135deg,#0d0d0d 60%,#1a1a2e);border:1.5px solid rgba(255,255,255,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.9rem;transition:opacity .45s ease,transform .45s ease;z-index:3;padding:2rem;text-align:center}
.reveal-lock-icon{color:rgba(255,255,255,.5);animation:lock-pulse 2.5s ease-in-out infinite}
.reveal-lock-q{font-size:clamp(1rem,1.7vw,1.3rem);font-weight:600;color:var(--ink);max-width:560px;line-height:1.6}
.reveal-lock-hint{font-size:.62rem;color:rgba(255,255,255,.3);letter-spacing:.1em;text-transform:uppercase}
.conf-stamp{position:absolute;top:.8rem;right:1rem;font-size:.58rem;font-weight:900;letter-spacing:.18em;color:rgba(255,32,85,.5);border:2px solid rgba(255,32,85,.35);border-radius:4px;padding:.2em .6em;text-transform:uppercase;transform:rotate(-4deg);z-index:4}
.reveal-wrap.revealed .reveal-lock{opacity:0;transform:scale(.94);pointer-events:none}
.reveal-wrap:not(.revealed):hover .reveal-lock{border-color:rgba(168,85,247,.35)}

/* MULTI-REVEAL GRID */
.mrev-grid{display:grid;gap:.9rem;margin-top:1rem}
.mrev-grid.cols-2{grid-template-columns:1fr 1fr}
.mrev-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
.mrev-grid.cols-4{grid-template-columns:1fr 1fr 1fr 1fr}
.unlock-card{position:relative;border-radius:12px;overflow:hidden;cursor:pointer;user-select:none;min-height:140px}
.unlock-card .card-answer{border-radius:12px;padding:1.3rem 1.4rem;height:100%;display:flex;flex-direction:column;gap:.5rem}
.unlock-card .card-mask{position:absolute;inset:0;border-radius:12px;background:#0d0d14;border:1.5px solid rgba(255,255,255,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.6rem;transition:opacity .4s ease,transform .4s var(--ease-back);z-index:2;padding:1rem;text-align:center;overflow:hidden}
.unlock-card .card-answer{visibility:hidden}
.unlock-card.unlocked .card-answer{visibility:visible}
.unlock-card .card-mask::after{content:'';position:absolute;top:0;left:-100%;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);animation:shimmer 3s ease-in-out infinite}
.unlock-card .card-mask-num{font-size:1.6rem;font-weight:800;color:rgba(255,255,255,.15)}
.unlock-card .card-mask-q{font-size:clamp(.78rem,1.25vw,.92rem);font-weight:600;color:rgba(255,255,255,.55);line-height:1.5;max-width:200px}
.unlock-card .card-mask-hint{font-size:var(--min-label);color:rgba(255,255,255,.3);letter-spacing:.1em;text-transform:uppercase;margin-top:.2rem}
.unlock-card.unlocked .card-mask{opacity:0;transform:scale(.88);pointer-events:none}
.unlock-card .card-label{font-size:var(--min-label);font-weight:800;letter-spacing:.14em;text-transform:uppercase;margin-bottom:.2rem}
.unlock-card .card-title{font-size:clamp(.92rem,1.55vw,1.1rem);font-weight:700;color:var(--ink);line-height:1.3}
.unlock-card .card-body{font-size:clamp(.78rem,1.22vw,.9rem);color:var(--mid);line-height:1.6;margin-top:.3rem}
.unlock-card:not(.unlocked):hover .card-mask{border-color:rgba(255,255,255,.22)}

/* STEP REVEAL */
.step-reveal-wrap{display:flex;flex-direction:column;gap:.7rem;margin-top:.9rem}
.step-item{border-radius:10px;overflow:hidden;cursor:pointer;user-select:none}
.step-item .step-front{display:flex;align-items:center;gap:1rem;padding:.85rem 1.25rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;transition:border-color .2s,background .2s}
.step-item .step-num{font-size:.95rem;font-weight:800;min-width:1.7rem;flex-shrink:0}
.step-item .step-q{font-size:clamp(.85rem,1.4vw,.98rem);font-weight:600;color:var(--ink)}
.step-item .step-lock{font-size:.8rem;margin-left:auto;opacity:.35;transition:opacity .2s,transform .3s}
.step-item .step-back{max-height:0;overflow:hidden;transition:max-height .42s var(--ease-smooth),opacity .32s ease;opacity:0;background:rgba(255,107,0,.06);border-radius:0 0 10px 10px}
.step-item.open .step-front{border-color:rgba(255,107,0,.4);background:rgba(255,107,0,.08);border-radius:10px 10px 0 0}
.step-item.open .step-lock{opacity:0;transform:rotate(90deg)}
.step-item.open .step-back{max-height:180px;opacity:1}
.step-item:not(.open):hover .step-front{border-color:rgba(255,255,255,.18)}
.step-back-inner{padding:.75rem 1.25rem .95rem;font-size:clamp(.83rem,1.3vw,.96rem);color:rgba(255,255,255,.8);line-height:1.65}
.step-back-inner strong{color:var(--orange)}

/* COMPARE CARDS with mask */
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin-top:1rem}
.cmp-card{border-radius:12px;padding:1.4rem;border:1.5px solid;position:relative;overflow:hidden}
.cmp-no{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.1)}
.cmp-yes{background:rgba(255,107,0,.07);border-color:rgba(255,107,0,.3)}
.cmp-card h3{font-size:clamp(.9rem,1.55vw,1.18rem);margin:.4rem 0 .35rem;color:var(--ink)}
.cmp-card .cmp-mask{position:absolute;inset:0;background:#0c0c14;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.5rem;cursor:pointer;transition:opacity .4s ease,transform .4s var(--ease-back);z-index:2;overflow:hidden}
.cmp-card:not(.revealed) > :not(.cmp-mask){visibility:hidden}
.cmp-card.revealed > :not(.cmp-mask){visibility:visible}
.cmp-card .cmp-mask::after{content:'';position:absolute;top:0;left:-100%;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);animation:shimmer 3s .5s ease-in-out infinite}
.cmp-card .cmp-mask-icon{font-size:1.9rem}
.cmp-card .cmp-mask-label{font-size:.65rem;color:rgba(255,255,255,.3);letter-spacing:.1em;text-transform:uppercase;margin-top:.2rem}
.cmp-card.revealed .cmp-mask{opacity:0;transform:scale(.92);pointer-events:none}
.cmp-card:not(.revealed):hover .cmp-mask{background:#111120}

/* VENN */
.venn-circle{cursor:pointer;transition:opacity .3s}
.venn-circle.dim{opacity:.3}
.venn-label-group{cursor:pointer;transition:opacity .3s}
.venn-label-group.dim{opacity:.25}
.dfv-circle{cursor:pointer;transition:opacity .3s}
.dfv-circle.dim{opacity:.12}
.dfv-label{cursor:pointer;transition:opacity .3s}
.dfv-label.dim{opacity:.12}
.phase-panel{transition:background .15s,border-color .15s,transform .1s;}
.phase-panel:active{filter:brightness(1.25);transform:scale(.99);}
.mandala-cell{cursor:pointer;user-select:none;transition:transform .2s var(--ease-back),opacity .2s,border-color .2s;}
.mandala-cell:hover{transform:scale(1.05);border-color:currentColor;}
.mandala-cell:active{transform:scale(.96);}
.venn-detail-box{margin-top:.8rem;padding:.8rem 1.3rem;border-radius:8px;border-left:3px solid;font-size:clamp(.83rem,1.32vw,.97rem);line-height:1.65;color:var(--ink);transition:opacity .3s,transform .3s;min-height:3rem}
.venn-detail-box.hidden{opacity:0;transform:translateY(6px);pointer-events:none}

/* FUNNEL */
.funnel-layer{cursor:pointer;transition:opacity .3s}
.funnel-layer.dim{opacity:.28}

/* TIMER */
.timer-wrap{display:flex;flex-direction:column;align-items:center;gap:1.2rem;margin-top:1.2rem}
.timer-display{font-size:clamp(5rem,15vw,10rem);font-weight:800;letter-spacing:-.04em;font-variant-numeric:tabular-nums;line-height:1;background:linear-gradient(135deg,var(--orange),var(--red));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.timer-display.done{background:linear-gradient(135deg,var(--red),#ff6080);-webkit-background-clip:text;background-clip:text}
.timer-btn{background:linear-gradient(135deg,var(--orange),var(--red));color:#fff;border:none;border-radius:8px;padding:.7rem 2.2rem;font-size:.95rem;font-weight:700;cursor:pointer;letter-spacing:.05em;transition:opacity .2s,transform .15s}
.timer-btn:hover{opacity:.85;transform:scale(1.04)}
.timer-btn.running{background:linear-gradient(135deg,#555,#333)}
.timer-reset-btn{background:transparent;color:var(--mid);border:1.5px solid var(--line);border-radius:8px;padding:.7rem 1.8rem;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .2s}
.timer-reset-btn:hover{border-color:var(--orange);color:var(--orange)}

/* PROFILE — centered layout with slide-up photos */
.profile-wrap{display:flex;flex-direction:column;align-items:center;gap:1.2rem;text-align:center;width:100%}
.profile-header{display:flex;flex-direction:column;align-items:center;gap:.5rem}
.profile-cards-row{display:flex;gap:.7rem;flex-wrap:wrap;justify-content:center;width:100%;max-width:900px}
.profile-card{border-radius:14px;cursor:pointer;background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.1);transition:all .3s var(--ease-back);width:280px;text-align:left;flex-shrink:0;position:relative;overflow:hidden}
.profile-card:hover{border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.05);transform:translateY(-3px)}
.profile-card.pc-open{border-color:rgba(255,107,0,.6);background:rgba(255,107,0,.08)}
.profile-card .pc-front{padding:.9rem 1.15rem;display:flex;align-items:center;gap:.8rem}
.profile-card .pc-icon{width:2rem;height:2rem;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.profile-card .pc-icon svg{width:100%;height:100%}
.profile-card .pc-front-label{font-size:var(--min-label);font-weight:800;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.12rem}
.profile-card .pc-front-title{font-size:clamp(.88rem,1.4vw,1rem);font-weight:700;color:var(--ink);line-height:1.3}
.profile-card .pc-arrow{margin-left:auto;font-size:1rem;color:rgba(255,255,255,.25);transition:transform .35s var(--ease-back),color .25s;flex-shrink:0}
.profile-card.pc-open .pc-arrow{transform:rotate(90deg);color:var(--orange)}
/* slide-up photo gallery below all cards */
.profile-gallery{width:100%;max-width:900px;display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap;margin-top:.5rem;min-height:0;overflow:hidden}
.profile-photo-slot{width:280px;height:0;opacity:0;overflow:hidden;border-radius:14px;transition:height .45s var(--ease-back),opacity .35s ease,transform .45s var(--ease-back);transform:translateY(30px);position:relative}
.profile-photo-slot.visible{height:260px;opacity:1;transform:translateY(0)}
.profile-photo-slot img{width:100%;height:100%;object-fit:cover;display:block}
.profile-photo-slot .photo-cap{position:absolute;bottom:0;left:0;right:0;padding:.6rem .8rem;background:linear-gradient(transparent,rgba(0,0,0,.75));font-size:.72rem;color:rgba(255,255,255,.9);line-height:1.4}

/* TRIAD — three interactive orbs */
.triad-wrap{display:flex;align-items:stretch;gap:1rem;margin-top:1.1rem;flex-wrap:nowrap}
.triad-orb{flex:1;border-radius:16px;border:1.5px solid;cursor:pointer;user-select:none;overflow:hidden;transition:transform .3s var(--ease-back),box-shadow .35s ease,border-color .3s ease}
.triad-orb:not(.to-open):hover{transform:translateY(-4px)}
.triad-orb.to-open{transform:translateY(-3px)}
.triad-orb-front{padding:1.6rem 1.3rem 1.3rem;display:flex;flex-direction:column;align-items:center;text-align:center;gap:.6rem}
.triad-orb-circle{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto .15rem;position:relative;flex-shrink:0;transition:box-shadow .35s ease}
.triad-orb.to-open .triad-orb-circle{box-shadow:0 0 28px rgba(255,255,255,.1)}
.triad-orb-en{font-size:var(--min-label);font-weight:800;letter-spacing:.16em;text-transform:uppercase;margin-bottom:.08rem;transition:opacity .2s}
.triad-orb-zh{font-size:clamp(1.2rem,2.2vw,1.6rem);font-weight:800;line-height:1.1}
.triad-orb-tagline{font-size:clamp(.76rem,1.22vw,.88rem);color:var(--mid);line-height:1.55}
.triad-orb-hint{font-size:var(--min-label);letter-spacing:.1em;text-transform:uppercase;opacity:.28;margin-top:.25rem;transition:opacity .2s}
.triad-orb.to-open .triad-orb-hint{opacity:0}
/* expanded detail panel */
.triad-detail{max-height:0;overflow:hidden;transition:max-height .45s var(--ease-smooth),opacity .32s ease;opacity:0;border-top:1px solid rgba(255,255,255,.07)}
.triad-orb.to-open .triad-detail{max-height:420px;opacity:1}
.triad-detail-inner{padding:1rem 1.3rem 1.2rem;display:flex;flex-direction:column;gap:.6rem}
.triad-det-row{display:flex;gap:.6rem;align-items:flex-start}
.triad-det-tag{font-size:.5rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:.2em .6em;border-radius:4px;color:#fff;white-space:nowrap;margin-top:.18rem;flex-shrink:0}
.triad-det-txt{font-size:clamp(.78rem,1.25vw,.88rem);line-height:1.68;color:rgba(255,255,255,.78)}
.triad-det-txt strong{color:var(--ink)}
/* photo panel — slides in from right */
.profile-photo-panel{width:260px;flex-shrink:0;position:relative;overflow:hidden}
.ppp-inner{display:flex;flex-direction:column;gap:.6rem;opacity:0;transform:translateX(28px);transition:opacity .38s ease,transform .38s var(--ease-back);pointer-events:none}
.ppp-inner.visible{opacity:1;transform:none;pointer-events:all}
.ppp-main{width:100%;aspect-ratio:4/3;border-radius:12px;overflow:hidden;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}
.ppp-main img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .3s ease}
.ppp-thumbs{display:flex;gap:.45rem}
.ppp-thumb{width:72px;height:52px;border-radius:7px;object-fit:cover;cursor:pointer;border:2px solid transparent;opacity:.5;transition:opacity .2s,border-color .2s,transform .2s var(--ease-back);flex-shrink:0}
.ppp-thumb:hover{opacity:.85;transform:translateY(-2px)}
.ppp-thumb.active{opacity:1;border-color:var(--orange)}
.ppp-cap{font-size:.7rem;color:var(--mid);line-height:1.55}

/* FIXED CHROME */
#prog{position:fixed;top:0;left:0;right:0;height:2px;background:rgba(255,255,255,.06);z-index:900}
#prog-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--red),var(--purple));transition:width .4s ease;width:0%}
#breadcrumb{position:fixed;top:2px;left:50%;transform:translateX(-50%);font-size:.58rem;font-weight:700;letter-spacing:.1em;color:rgba(255,255,255,.4);background:rgba(15,15,20,.92);backdrop-filter:blur(12px);padding:.2rem .75rem;border-radius:0 0 6px 6px;z-index:901;white-space:nowrap;border:1px solid var(--line);border-top:none;text-transform:uppercase}
#sec-indicator{position:fixed;top:12px;right:16px;z-index:910;padding:.32rem .85rem;border-radius:999px;font-size:.65rem;font-weight:700;color:rgba(255,255,255,.7);background:rgba(255,255,255,.06);backdrop-filter:blur(12px);border:1px solid var(--line);transition:all .25s;letter-spacing:.06em;text-transform:uppercase}
#dot-nav{position:fixed;right:16px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:4px;z-index:900;max-height:85vh;overflow-y:auto;overflow-x:visible;scrollbar-width:none;-ms-overflow-style:none}
#dot-nav::-webkit-scrollbar{display:none}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.18);transition:all .25s;cursor:pointer;flex-shrink:0}
.dot.active{background:var(--orange);transform:scale(1.6)}
.dot.same-sec{background:rgba(255,107,0,.35)}
#dot-tooltip{position:fixed;background:rgba(20,20,30,.75);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.18);border-radius:6px;padding:2px 8px;font-size:.58rem;font-weight:700;color:rgba(255,255,255,.9);letter-spacing:.06em;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .18s ease;z-index:950;transform:translateY(-50%);}
#dot-tooltip.show{opacity:1;}
.nav-btn{position:fixed;z-index:900;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.07);backdrop-filter:blur(12px);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.95rem;color:rgba(255,255,255,.6);transition:all .25s var(--ease-back)}
.nav-btn:hover{transform:scale(1.12);color:var(--orange);border-color:rgba(255,107,0,.4)}
#btn-prev{bottom:68px;right:68px}
#btn-next{bottom:68px;right:16px}
#counter{position:fixed;bottom:76px;left:18px;z-index:900;font-size:1.5rem;font-weight:800;color:#ffffff;letter-spacing:.04em;font-variant-numeric:tabular-nums;text-shadow:0 2px 12px rgba(0,0,0,.7)}
#sec-nav{position:fixed;bottom:0;left:0;right:0;height:52px;background:rgba(8,8,12,.95);backdrop-filter:blur(20px);display:flex;align-items:stretch;z-index:950;border-top:1px solid var(--line)}
.sec-btn{flex:1;display:flex;align-items:center;justify-content:center;font-size:clamp(.56rem,.8vw,.72rem);font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.3);cursor:pointer;border:none;background:transparent;border-right:1px solid var(--line);transition:color .2s,background .2s;border-top:2px solid transparent;position:relative;overflow:visible}
.sec-btn:last-child{border-right:none}
.sec-btn:hover{color:rgba(255,255,255,.8);background:rgba(255,107,0,.08)}
.sec-btn.active{color:#fff;background:rgba(255,107,0,.1);border-top-color:var(--orange)}
.sec-btn-split{position:absolute;bottom:100%;left:0;right:0;height:0;overflow:hidden;transition:height .28s cubic-bezier(.25,.46,.45,.94);background:rgba(8,8,12,.97);border:1px solid rgba(255,255,255,.1);border-bottom:none;border-radius:10px 10px 0 0;display:flex;z-index:1001}
.sec-btn:hover .sec-btn-split{height:66px}
.sec-split-col{flex:1;display:flex;align-items:center;justify-content:center;padding:.3rem .25rem;cursor:pointer;border-right:1px solid rgba(255,255,255,.06);opacity:0;transform:translateY(5px);transition:opacity .2s ease,transform .2s ease,background .15s,color .15s;font-size:.62rem;font-weight:700;color:rgba(255,255,255,.6);text-align:center;line-height:1.35;letter-spacing:.04em;text-transform:none}
.sec-split-col:last-child{border-right:none}
.sec-btn:hover .sec-split-col:nth-child(1){opacity:1;transform:none;transition-delay:.05s}
.sec-btn:hover .sec-split-col:nth-child(2){opacity:1;transform:none;transition-delay:.1s}
.sec-btn:hover .sec-split-col:nth-child(3){opacity:1;transform:none;transition-delay:.15s}
.sec-btn:hover .sec-split-col:nth-child(4){opacity:1;transform:none;transition-delay:.2s}
.sec-split-col:hover{background:rgba(255,107,0,.1);color:var(--orange)}
/* Sprint slide */
.sprint-badge-v3{display:inline-flex;align-items:center;gap:.5rem;background:linear-gradient(135deg,rgba(255,32,85,.18),rgba(255,107,0,.12));border:2px solid rgba(255,32,85,.45);border-radius:12px;padding:.5rem 1.3rem;font-size:var(--min-font);font-weight:800;color:var(--red);letter-spacing:.08em;text-transform:uppercase;margin-bottom:1rem}
.sprint-task-v3{font-size:clamp(1rem,1.5vw,1.2rem);color:rgba(255,255,255,.8);line-height:1.8;padding:1.1rem 1.4rem;background:rgba(255,32,85,.06);border:1.5px solid rgba(255,32,85,.2);border-radius:12px;margin:1rem 0;text-align:center}
/* mc-pop for mandala (already in brain_os but add for safety) */
@keyframes mc-pop{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
.adv-challenge-wrap.adv-open{max-height:600px!important;opacity:1!important}
/* Cross-reference links */
.xref-wrap{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.9rem;justify-content:flex-end;position:relative;z-index:2}
.xref-link{display:inline-flex;align-items:center;gap:.3rem;font-size:.58rem;font-weight:700;letter-spacing:.1em;padding:.2em .65em;border-radius:5px;border:1px solid rgba(255,107,0,.35);color:rgba(255,170,80,.9);background:rgba(255,107,0,.07);cursor:pointer;text-transform:uppercase;transition:all .2s;white-space:nowrap;text-decoration:none}
.xref-link:hover{border-color:rgba(255,107,0,.75);background:rgba(255,107,0,.15);transform:translateY(-1px)}
/* Advanced challenge improved button */
.adv-btn-wrap{margin-top:1.2rem;text-align:center;position:relative;z-index:1}
.adv-btn{background:linear-gradient(135deg,rgba(255,107,0,.12),rgba(255,32,85,.08));border:1.5px solid rgba(255,107,0,.4);color:var(--orange);border-radius:10px;padding:.55rem 1.8rem;font-size:.78rem;font-weight:800;cursor:pointer;letter-spacing:.1em;text-transform:uppercase;transition:all .25s;display:inline-flex;align-items:center;gap:.5rem}
.adv-btn:hover{background:linear-gradient(135deg,rgba(255,107,0,.22),rgba(255,32,85,.15));border-color:var(--orange);transform:scale(1.03)}

/* ── LEFT SECTION RAIL ─────────────────────────────────────────── */
#sec-rail{position:fixed;left:14px;top:50%;transform:translateY(-50%);z-index:900;display:flex;flex-direction:column;align-items:center;pointer-events:none}
.ri{position:relative;display:flex;flex-direction:column;align-items:center;cursor:pointer;pointer-events:all}
.rnode{width:26px;height:26px;border-radius:50%;border:1.5px solid rgba(255,255,255,.12);background:rgba(10,10,15,.65);display:flex;align-items:center;justify-content:center;position:relative;z-index:1;font-size:.52rem;font-weight:900;color:rgba(255,255,255,.2);transition:width .32s var(--ease-back),height .32s var(--ease-back),border-color .3s,background .3s,box-shadow .3s,color .3s}
.rconn{width:2px;height:26px;background:rgba(255,255,255,.06);position:relative;overflow:hidden;border-radius:1px;margin:0 auto}
.rconn-fill{position:absolute;top:0;left:0;right:0;height:0%;border-radius:1px;transition:height .4s ease}
.rlabel{position:absolute;left:calc(100% + 12px);top:50%;transform:translateY(-50%);white-space:nowrap;font-size:.58rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:rgba(255,255,255,.82);background:rgba(8,8,14,.92);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.09);padding:.22rem .72rem;border-radius:99px;opacity:0;pointer-events:none;transition:opacity .22s;line-height:1}
.ri.ron .rnode{width:34px;height:34px;color:#fff}
.rlabel{display:none}
.ri.rdone .rnode{color:#fff}
@keyframes rburst{0%{transform:scale(1)}38%{transform:scale(1.45)}68%{transform:scale(.92)}100%{transform:scale(1)}}
@keyframes rring{from{transform:scale(1);opacity:.75}to{transform:scale(2.6);opacity:0}}
.ri.rjustdone .rnode{animation:rburst .55s var(--ease-back) forwards}
.ri.rjustdone .rnode::after{content:'';position:absolute;inset:-2px;border-radius:50%;border:2px solid var(--rc);animation:rring .55s ease forwards;pointer-events:none}

/* ── MOBILE RESPONSIVE ─────────────────────────────────────────────────── */
@media (max-width: 767px) {
  html { font-size: 16px; }
  .slide { padding: 1rem 1rem 52px !important; }
  .inner {
    max-height: calc(100vh - 68px);
    overflow-y: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .inner::-webkit-scrollbar { display: none; }

  /* Typography */
  .hero-txt { font-size: clamp(2rem, 9vw, 3.2rem) !important; }
  h1 { font-size: clamp(1.5rem, 6.5vw, 2.4rem) !important; }
  h2 { font-size: clamp(1.15rem, 5vw, 1.7rem) !important; }
  h3 { font-size: clamp(.85rem, 3.5vw, 1.1rem) !important; }
  p, li { font-size: clamp(.78rem, 3.4vw, .92rem) !important; line-height: 1.65; }
  .chip { font-size: .52rem; padding: .22em .65em; }
  .chip.chip-lg { font-size: .68rem; padding: .28em .9em; }
  .tip-box { font-size: clamp(.74rem, 3vw, .88rem); }
  .deck-list li { font-size: clamp(.78rem, 3.2vw, .92rem); }
  .bar { margin: .4rem 0 .7rem; }

  /* Hide desktop-only chrome */
  #sec-rail { display: none !important; }
  #dot-nav { display: none !important; }
  #sec-indicator { display: none !important; }

  /* Reposition fixed elements */
  #breadcrumb {
    font-size: .44rem;
    max-width: 58vw;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding: .18rem .55rem;
  }
  #counter { font-size: .95rem; left: 10px; bottom: 50px; }
  .nav-btn { width: 34px; height: 34px; font-size: .8rem; }
  #btn-prev { bottom: 50px !important; right: 50px !important; }
  #btn-next { bottom: 50px !important; right: 8px !important; }
  #btn-music {
    width: 32px !important; height: 32px !important;
    bottom: 92px !important; right: 8px !important;
    font-size: .75rem !important;
  }

  /* Bottom section nav */
  #sec-nav { height: 44px; }
  .sec-btn { font-size: .42rem; letter-spacing: .01em; padding: 0 2px; }

  /* Grid layouts */
  .mrev-grid.cols-3 { grid-template-columns: 1fr 1fr !important; }
  .mrev-grid.cols-4 { grid-template-columns: 1fr 1fr !important; }
  .compare-grid { grid-template-columns: 1fr !important; gap: .8rem; }

  /* JS-generated inline grids */
  .slide-content [style*="grid-template-columns:1fr 1fr"] {
    grid-template-columns: 1fr !important;
  }
  .slide-content [style*="grid-template-columns:repeat(3,1fr)"] {
    grid-template-columns: 1fr !important;
  }
  .slide-content [style*="grid-template-columns:repeat(5,1fr)"] {
    grid-template-columns: 1fr 1fr !important;
  }
  .slide-content [style*="grid-template-columns:repeat(4,1fr)"] {
    grid-template-columns: 1fr 1fr !important;
  }

  /* Triad stack vertically */
  .triad-wrap { flex-direction: column !important; gap: .6rem; }
  .triad-orb-circle { width: 54px; height: 54px; }
  .triad-orb-zh { font-size: clamp(1rem, 3.5vw, 1.3rem); }
  .triad-orb-tagline { font-size: clamp(.72rem, 2.8vw, .84rem); }
  .triad-det-txt { font-size: clamp(.74rem, 2.8vw, .85rem); }

  /* Profile */
  .profile-cards-row { flex-direction: column !important; align-items: center; }
  .profile-card { width: min(100%, 340px) !important; }
  .profile-gallery { flex-direction: column !important; align-items: center; }
  .profile-photo-slot { width: min(100%, 340px) !important; }
  .profile-photo-panel { display: none !important; }

  /* Carousel */
  .carousel-wrap { width: min(88vw, 520px) !important; }

  /* Timer */
  .timer-display { font-size: clamp(3.2rem, 18vw, 6rem) !important; }
  .timer-wrap { gap: .9rem; margin-top: .8rem; }

  /* Unlock cards */
  .unlock-card { min-height: 100px; }
  .unlock-card .card-mask-q { font-size: clamp(.68rem, 2.8vw, .82rem); }
  .unlock-card .card-title { font-size: clamp(.84rem, 3.2vw, 1rem); }
  .unlock-card .card-body { font-size: clamp(.72rem, 2.8vw, .84rem); }

  /* Step reveal */
  .step-item .step-q { font-size: clamp(.78rem, 3.2vw, .92rem); }
  .step-back-inner { font-size: clamp(.78rem, 3vw, .9rem); }

  /* Compare cards */
  .cmp-card h3 { font-size: clamp(.86rem, 3.2vw, 1rem); }

  /* Venn */
  .venn-detail-box { font-size: clamp(.74rem, 2.8vw, .88rem); }

  /* Close-carousel: hide floating quotes, reflow layout */
  .float-quote { display: none !important; }
  .slide-content [style*="min-height:620px"] {
    min-height: auto !important;
    height: auto !important;
  }
  .slide-content [style*="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)"] {
    position: relative !important;
    top: auto !important; left: auto !important;
    transform: none !important;
    width: 92% !important;
    max-width: 92vw !important;
    margin: 0 auto !important;
    padding: 1.2rem 1.2rem !important;
  }
  .slide-content [style*="position:absolute;bottom:0;left:50%"] {
    position: relative !important;
    bottom: auto !important; left: auto !important;
    transform: none !important;
    margin-top: .8rem;
    display: flex !important;
    justify-content: center;
    gap: 1.2rem !important;
    padding-bottom: .5rem;
  }
  .slide-content [style*="position:absolute;bottom:0;left:50%"] img {
    width: 100px !important; height: 100px !important;
  }

  /* Allow text to wrap */
  .slide-content [style*="white-space:nowrap"] { white-space: normal !important; }
  .chip, .card-label, .step-num { white-space: nowrap !important; }

  /* Reveal */
  .reveal-answer { font-size: clamp(.86rem, 3.2vw, 1rem); padding: 1.2rem 1.4rem; }
  .reveal-lock-q { font-size: clamp(.9rem, 3.5vw, 1.1rem); }

  /* SVG scale to fit */
  svg[width][height] { max-width: 100%; height: auto; }
}
</style>
</head>
<body>
<div id="prog"><div id="prog-fill"></div></div>
<div id="breadcrumb">Section 1 · 開場</div>
<div id="sec-indicator">① 底層思維</div>
<div id="dot-nav"></div>
<div id="sec-rail"></div>
<div id="counter">1 / 50</div>

function applyTextTranslations(){
  const cont=document.getElementById('slides-container');
  if(!cont)return;
  const walker=document.createTreeWalker(cont,NodeFilter.SHOW_TEXT);
  let node;
  while((node=walker.nextNode())){
    let t=node.textContent;
    if(!t.trim())continue;
    let changed=false;
    for(const [zh,en] of ZH_EN_PAIRS){
      if(t.includes(zh)){t=t.split(zh).join(en);changed=true;}
    }
    if(changed)node.textContent=t;
  }
}

function reRenderSlides(){
  slideEls.forEach(el=>observer.unobserve(el));
  slideEls.length=0;
  container.innerHTML='';
  D.forEach((sd,idx)=>{
    const el=renderSlide(applyLang(sd),idx);
    container.appendChild(el);
    slideEls.push(el);
    observer.observe(el);
  });
  dotNav.innerHTML='';
  D.forEach((sd,idx)=>{
    const d=document.createElement('div');d.className='dot';d.dataset.idx=idx;
    d.title=`${idx+1}. ${sd.sub}`;
    d.addEventListener('click',()=>scrollToSlide(idx));
    dotNav.appendChild(d);
  });
  if(LANG==='en')applyTextTranslations();
  document.querySelectorAll('.sec-btn').forEach((btn,i)=>{
    btn.textContent=LANG==='en'?SEC_LABELS_EN[i]:SEC_LABELS_ZH[i];
  });
  document.querySelectorAll('.rlabel').forEach((el,i)=>{
    if(i<RAIL_EN.length)el.textContent=LANG==='en'?RAIL_EN[i]:(RAIL[i]?.label||el.textContent);
  });
  setTimeout(initCarousels,200);
  scrollToSlide(cur);
}

function tdSwitch(sid,which){

  const tabBrds={td:'rgba(255,107,0,.45)',bu:'rgba(255,255,255,.15)',diff:'rgba(168,85,247,.3)'};
  const tabBgs={td:'rgba(255,107,0,.12)',bu:'rgba(255,255,255,.04)',diff:'rgba(168,85,247,.08)'};
  tabs.forEach(t=>{
    const p=document.getElementById('tdpanel-'+sid+'-'+t);
    const b=document.getElementById('tdtab-'+sid+'-'+t);
    const tx=document.getElementById('tdtabtxt-'+sid+'-'+t);
    const isA=t===which;
    if(p){p.style.opacity=isA?'1':'0';p.style.transform=isA?'translateY(0)':'translateY(16px)';p.style.pointerEvents=isA?'auto':'none';}
    if(b){b.style.opacity=isA?'1':'.55';b.style.borderColor=isA?tabBrds[t]:'rgba(255,255,255,.1)';b.style.background=isA?tabBgs[t]:'rgba(255,255,255,.03)';}

function toggleTimer(id,tot){
  const d=document.getElementById('td-'+id),b=document.getElementById('tb-'+id);
  if(!d||!b)return;
  if(timers[id]){clearInterval(timers[id]);delete timers[id];b.textContent='繼續';b.classList.remove('running');return;}
  const p=d.textContent.split(':');let r=parseInt(p[0])*60+parseInt(p[1]);
  if(r<=0){r=tot;d.textContent=fmt(tot);d.classList.remove('done');}
  b.textContent='暫停';b.classList.add('running');
  timers[id]=setInterval(()=>{r--;d.textContent=fmt(r);if(r<=0){clearInterval(timers[id]);delete timers[id];d.classList.add('done');b.textContent='完成';b.classList.remove('running');}},1000);
}
function resetTimer(id,tot){
  if(timers[id]){clearInterval(timers[id]);delete timers[id];}
  const d=document.getElementById('td-'+id),b=document.getElementById('tb-'+id);
  if(d){d.textContent=fmt(tot);d.classList.remove('done');}
  if(b){b.textContent='開始';b.classList.remove('running');}
}

      if(el){el.style.background='rgba(255,255,255,.03)';el.style.borderColor=steps[i].col;el.style.transform='';}
    }
    return;
  }
  // Reset all steps
  for(let i=0;i<5;i++){
    const el=document.getElementById('dt-'+sid+'-'+i);
    if(el){el.style.background='rgba(255,255,255,.03)';el.style.borderColor=steps[i].col;el.style.transform='';}
  }
  const s=steps[si];
  const el=document.getElementById('dt-'+sid+'-'+si);
  if(el){
    el.style.background=s.col+'22';
    el.style.borderColor=s.col;
    el.style.transform='translateY(-4px)';
  }
  if(detail&&desc){
    detail.style.opacity='1';
    detail.style.borderColor=s.col;
    desc.textContent=s.desc;
    detail.dataset.activeIdx=String(si);
  }
}

function insightReveal(uid){
  const el=document.getElementById(uid);
  if(!el)return;
  const mask=el.querySelector('.ins-mask');
  const answer=el.querySelector('.ins-answer');
  if(mask&&answer){
    const revealed=answer.style.visibility==='visible';
    if(revealed){
      mask.style.opacity='1';
      mask.style.transform='scale(1)';
      mask.style.pointerEvents='';
      answer.style.visibility='hidden';
    } else {
      mask.style.opacity='0';
      mask.style.transform='scale(.9)';
      mask.style.pointerEvents='none';
      answer.style.visibility='visible';
    }
  }
}

let bgMusicOn=false,bgCurSec=0,bgFadeTimer=null;
const bgAudio=document.createElement('audio');
bgAudio.loop=true;bgAudio.volume=0;bgAudio.preload='auto';
document.body.appendChild(bgAudio);

function bgFadeTo(target,ms=600){
  if(bgFadeTimer)clearInterval(bgFadeTimer);
  const maxVol=bgTracks[bgCurSec]?.vol||0.18;
  const clampedTarget=target===0?0:maxVol;
  const start=bgAudio.volume,steps=20,step=(clampedTarget-start)/steps;
  let i=0;
  bgFadeTimer=setInterval(()=>{
    i++;bgAudio.volume=Math.max(0,Math.min(maxVol,start+step*i));
    if(i>=steps){clearInterval(bgFadeTimer);bgFadeTimer=null;
      if(clampedTarget===0)bgAudio.pause();}
  },ms/steps);
}

function bgStartPlay(){
  bgAudio.play().then(()=>bgFadeTo(1,1200)).catch(()=>{
    // retry once on next user gesture via canplaythrough
    bgAudio.addEventListener('canplaythrough',()=>{ bgAudio.play().then(()=>bgFadeTo(1,1200)).catch(()=>{}); },{once:true});
  });
}

function bgSwitchTrack(sec){
  if(!bgMusicOn)return;
  if(bgCurSec===sec)return;
  const prev=bgCurSec;bgCurSec=sec;
  const t=bgTracks[sec]||bgTracks[1];
  if(bgFadeTimer)clearInterval(bgFadeTimer);
  const startVol=bgAudio.volume;
  let i=0;const steps=15;
  bgFadeTimer=setInterval(()=>{
    i++;bgAudio.volume=Math.max(0,startVol*(1-i/steps));
    if(i>=steps){
      clearInterval(bgFadeTimer);bgFadeTimer=null;
      bgAudio.pause();bgAudio.src=t.url;bgAudio.load();bgAudio.volume=0;
      bgStartPlay();
    }
  },30);
}

    } else if(done===3){
      // ── Sec3完成：bass kick + snare + ping，meme drum drop ──
      const oKick=ctx.createOscillator(),gKick=ctx.createGain();
      oKick.type='sine';oKick.frequency.setValueAtTime(140,now);
      oKick.frequency.exponentialRampToValueAtTime(36,now+0.18);
      oKick.connect(gKick);gKick.connect(master);
      gKick.gain.setValueAtTime(0.55,now);gKick.gain.exponentialRampToValueAtTime(0.001,now+0.42);
      oKick.start(now);oKick.stop(now+0.5);
      const bufSize=Math.floor(ctx.sampleRate*0.12);const buf=ctx.createBuffer(1,bufSize,ctx.sampleRate);
      const data=buf.getChannelData(0);for(let i=0;i<bufSize;i++)data[i]=(Math.random()*2-1);
      const snare=ctx.createBufferSource(),snareG=ctx.createGain(),snareFlt=ctx.createBiquadFilter();
      snareFlt.type='bandpass';snareFlt.frequency.value=2400;snareFlt.Q.value=0.9;
      snare.buffer=buf;snare.connect(snareFlt);snareFlt.connect(snareG);snareG.connect(master);
      snareG.gain.setValueAtTime(0.28,now+0.09);snareG.gain.exponentialRampToValueAtTime(0.001,now+0.30);
      snare.start(now+0.09);
      [1046.5,1318.5].forEach((f,i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type='sine';o.frequency.value=f;o.connect(g);g.connect(master);
        const t=now+0.26+i*0.13;
        g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.18,t+0.02);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.85);
        o.start(t);o.stop(t+1.0);
      });
    } else if(done===4){
      // ── Sec4完成：溫暖木琴和弦 E-G-C arp，柔和resolved感 ──
      [[329.6,0.00],[392.0,0.12],[523.3,0.22],[659.3,0.30]].forEach(([f,delay])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type='triangle';o.frequency.value=f;
        const flt=ctx.createBiquadFilter();flt.type='lowpass';flt.frequency.value=1800;
        o.connect(flt);flt.connect(g);g.connect(master);
        const t=now+delay;
        g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.26,t+0.03);
        g.gain.exponentialRampToValueAtTime(0.001,t+1.6);
        o.start(t);o.stop(t+1.8);
      });
      const d=ctx.createDelay(1);d.delayTime.value=0.18;const dg=ctx.createGain();dg.gain.value=0.14;
      master.connect(d);d.connect(dg);dg.connect(ctx.destination);
    } else {
      // ── Sec5完成→Q&A：水晶鐘聲由高而低，輕盈收尾 ──
      [[2093,0.00],[1568,0.18],[1047,0.34],[783.9,0.48],[523.3,0.60]].forEach(([f,delay])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type='sine';o.frequency.value=f;o.connect(g);g.connect(master);
        const t=now+delay;
        g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.20,t+0.02);
        g.gain.exponentialRampToValueAtTime(0.001,t+1.4);
        o.start(t);o.stop(t+1.6);
      });
      // 輕柔泛音
      [[2093,0.04],[1568,0.22],[1047,0.38]].forEach(([f,delay])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type='sine';o.frequency.value=f*2;o.connect(g);g.connect(master);
        const t=now+delay;
        g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.06,t+0.02);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.8);
        o.start(t);o.stop(t+1.0);
      });
      const d=ctx.createDelay(1);d.delayTime.value=0.28;const dg=ctx.createGain();dg.gain.value=0.20;
      master.connect(d);d.connect(dg);dg.connect(ctx.destination);
    }
  }catch(e){}
  setTimeout(()=>{bgCurSec=0;bgSwitchTrack(nextSec);},3000);
}
// ── END BACKGROUND MUSIC ─────────────────────────────────────────
function updateUI(){
  const sd=D[cur];const pct=total>1?(cur/(total-1))*100:0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('counter').textContent=`${cur+1} / ${total}`;
  document.getElementById('breadcrumb').textContent=`Section ${sd.sec}  ·  ${sd.sub}`;
  document.getElementById('sec-indicator').textContent=(LANG==='en'?secNamesEN:secNames)[sd.sec]||'';
  document.querySelectorAll('.sec-btn').forEach(btn=>{btn.classList.toggle('active',parseInt(btn.dataset.sec)===sd.sec);});
  const _newSec=sd.sec;
  if(bgPrevSec>0&&_newSec===bgPrevSec+1){playLevelComplete(_newSec);}
  else{bgSwitchTrack(_newSec);}
  bgPrevSec=_newSec;
  document.querySelectorAll('.dot').forEach(d=>{
    const i=parseInt(d.dataset.idx);
    d.classList.toggle('active',i===cur);
    d.classList.toggle('same-sec',D[i].sec===sd.sec&&i!==cur);
  });
  updateRail();
}
function updateRail(){
  const sec=D[cur].sec;
  RAIL.forEach(s=>{
    const item=rItems[s.n];if(!item)return;
    const node=item.querySelector('.rnode');
    const num=item.querySelector('.rnum');
    const chk=item.querySelector('.rchk');
    const prev=item.dataset.rs||'';
    const state=s.n<sec?'done':s.n===sec?'on':'off';
    if(state!==prev){
      item.dataset.rs=state;
      item.classList.toggle('ron',state==='on');
      item.classList.toggle('rdone',state==='done');
      if(state==='done'){
        if(prev==='on'){item.classList.add('rjustdone');setTimeout(()=>item.classList.remove('rjustdone'),700);}
        node.style.background=s.c;node.style.borderColor=s.c;
        node.style.boxShadow=`0 0 8px ${s.c}55`;node.style.color='#fff';
        num.style.display='none';chk.style.display='flex';
      } else if(state==='on'){
        node.style.background=s.c+'1a';node.style.borderColor=s.c;
        node.style.boxShadow=`0 0 18px ${s.c}90`;node.style.color='#fff';
        num.style.display='flex';chk.style.display='none';
      } else {
        node.style.cssText='';num.style.display='flex';chk.style.display='none';
      }
    }
  });
  Object.entries(rConns).forEach(([sn,conn])=>{
    const n=parseInt(sn),fill=conn.querySelector('.rconn-fill');
    if(n<sec){fill.style.height='100%';}
    else if(n===sec){
      const end=(secStarts[sec+1]||D.length)-1,start=secStarts[sec];
      const pct=end>start?Math.max(0,Math.min(100,(cur-start)/(end-start)*100)):100;
      fill.style.height=pct+'%';
    } else {fill.style.height='0%';}
  });
}
function scrollToSlide(idx){
  idx=Math.max(0,Math.min(idx,total-1));
  slideEls[idx]?.scrollIntoView({behavior:'smooth',block:'start'});
  cur=idx;updateUI();
  sessionStorage.setItem('slide',idx);
}
function jumpToSection(sec){const idx=secStarts[sec];if(idx!==undefined)scrollToSlide(idx);}
function jumpToSlide(slideId){const idx=D.findIndex(s=>s.id===slideId);if(idx!==-1)scrollToSlide(idx);}
document.getElementById('btn-prev').addEventListener('click',()=>scrollToSlide(cur-1));
document.getElementById('btn-next').addEventListener('click',()=>{const t=findNextRevealable();if(t){t.click();}else{scrollToSlide(cur+1);}});
// ── SEQUENTIAL ACCORDION: seqOpen(grpId, idx) ─────────────────────────────
// Manual click on seq-grp buttons — toggles only the clicked item, siblings stay as-is
function seqManualToggle(grpId,idx){
  const grp=document.getElementById(grpId);if(!grp)return;
  const bodies=[...grp.querySelectorAll('[data-seq-body]')];
  const arrs=[...grp.querySelectorAll('[data-seq-arr]')];
  const body=bodies[idx];if(!body)return;
  const isOpen=body.style.maxHeight!=='0px'&&body.style.maxHeight!=='';
  body.style.maxHeight=isOpen?'0px':'400px';
  body.style.opacity=isOpen?'0':'1';
  if(arrs[idx])arrs[idx].style.transform=isOpen?'rotate(0deg)':'rotate(180deg)';
}
// Independent accordion toggle — open-only, siblings stay open (Octalysis page)
function ocToggle(grpId,idx){
  const body=document.getElementById(grpId+'_b'+idx);
  const arr=document.getElementById(grpId+'_a'+idx);
  if(!body)return;
  body.style.maxHeight='280px';
  body.style.opacity='1';
  if(arr)arr.style.transform='rotate(180deg)';
}
// Exclusive accordion — opens clicked item, closes all siblings (DMM page)
function dmmToggle(grpId,idx){
  const grp=document.getElementById(grpId);
  if(!grp)return;
  const bodies=grp.querySelectorAll('[data-seq-body]');
  const arrs=grp.querySelectorAll('[data-seq-arr]');
  const target=document.getElementById(grpId+'_b'+idx);
  if(!target)return;
  const isOpen=target.style.maxHeight&&target.style.maxHeight!=='0px';
  bodies.forEach((b,i)=>{b.style.maxHeight='0px';b.style.opacity='0';if(arrs[i])arrs[i].style.transform='rotate(0deg)';});
  if(!isOpen){
    target.style.maxHeight='100px';target.style.opacity='1';
    const arr=document.getElementById(grpId+'_a'+idx);
    if(arr)arr.style.transform='rotate(180deg)';
  }
}
// Closes all sibling bodies in group, opens the one at idx (toggles if already open).
// Also advances data-seq-step so the ↓ button knows where to continue.
function seqOpen(grpId,idx){
  const grp=document.getElementById(grpId);if(!grp)return;
  const bodies=[...grp.querySelectorAll('[data-seq-body]')];
  const arrs=[...grp.querySelectorAll('[data-seq-arr]')];
  const wasOpen=bodies[idx]&&bodies[idx].style.maxHeight!=='0px'&&bodies[idx].style.maxHeight!=='';
  bodies.forEach((b,i)=>{b.style.maxHeight='0px';b.style.opacity='0';if(arrs[i])arrs[i].style.transform='rotate(0deg)';});
  if(!wasOpen&&bodies[idx]){
    bodies[idx].style.maxHeight='400px';bodies[idx].style.opacity='1';
    if(arrs[idx])arrs[idx].style.transform='rotate(180deg)';
    grp.dataset.seqStep=String(idx+1);
  }else{
    grp.dataset.seqStep=String(idx);
  }
}
// Sequential reveal: find next locked element in the current slide and trigger it
function findNextRevealable(){
  const slideEl=document.querySelector(`.slide[data-index="${cur}"]`);
  if(!slideEl)return null;
  // 1. First unlock-card not yet unlocked
  const card=slideEl.querySelector('.unlock-card:not(.unlocked)');
  if(card)return card;
  // 2. First triad-orb not yet opened
  const orb=slideEl.querySelector('.triad-orb:not(.to-open)');
  if(orb)return orb;
  // 3. First insightReveal box whose answer is still hidden
  const ins=[...slideEl.querySelectorAll('[onclick*="insightReveal"]')].find(el=>{
    const ans=el.querySelector('.ins-answer');
    return ans&&ans.style.visibility!=='visible';
  });
  if(ins)return ins;
  // 4. First collapsed category button (tools-wall-v2 etc.)
  const catBtn=[...slideEl.querySelectorAll('button[data-reveal-btn]')].find(btn=>{
    const body=btn.nextElementSibling;
    return body&&body.style.display==='none';
  });
  if(catBtn)return catBtn;
  // 5. First step-item accordion not yet open (audience-layers etc.)
  const stepItem=slideEl.querySelector('.step-item:not(.open)');
  if(stepItem)return stepItem;
  // 6. First compare card not yet revealed (vitamin-painkiller etc.)
  const cmpCard=slideEl.querySelector('.cmp-card:not(.revealed)');
  if(cmpCard)return cmpCard;
  // 7. Top-down / Bottom-up panels (topdown-bottomup-v2)
  const tdCont=slideEl.querySelector('[data-td-step]');
  if(tdCont){
    const step=parseInt(tdCont.dataset.tdStep||'0');
    const seq=['bu','td'];
    if(step<seq.length){
      const which=seq[step];
      tdCont.dataset.tdStep=String(step+1);
      const sid=slideEl.dataset.id;
      return {click(){
        const body=document.getElementById('tdbody-'+sid+'-'+which);
        if(body){body.style.maxHeight='420px';body.dataset.open='1';}
        const arrow=document.getElementById('tdarrow-'+sid+'-'+which);
        if(arrow)arrow.style.transform='rotate(180deg)';
      }};
    }
  }
  // 8. Phase panels (time-allocation) — open one at a time via step counter
  const phaseContainer=slideEl.querySelector('[data-phase-step]');
  if(phaseContainer){
    const panels=[...phaseContainer.querySelectorAll('.phase-panel')];
    const pStep=parseInt(phaseContainer.dataset.phaseStep||'0');
    if(pStep<panels.length){phaseContainer.dataset.phaseStep=String(pStep+1);return panels[pStep];}
  }
  // 8. Mandala cells — cycle through one at a time using data-mandala-step
  const mandalaGrid=slideEl.querySelector('[data-mandala-step]');
  if(mandalaGrid){
    const cells=[...mandalaGrid.querySelectorAll('.mandala-cell')];
    const step=parseInt(mandalaGrid.dataset.mandalaStep||'0');
    if(step<cells.length){mandalaGrid.dataset.mandalaStep=String(step+1);return cells[step];}
  }
  // 9. Sequential accordion groups (data-seq-grp) — close previous, open next
  const seqGrps=[...slideEl.querySelectorAll('[data-seq-grp]')];
  for(const seqGrp of seqGrps){
    const step=parseInt(seqGrp.dataset.seqStep||'0');
    const bodies=[...seqGrp.querySelectorAll('[data-seq-body]')];
    if(step<bodies.length){
      const arrs=[...seqGrp.querySelectorAll('[data-seq-arr]')];
      if(!('seqKeep' in seqGrp.dataset)){
        bodies.forEach((b,i)=>{b.style.maxHeight='0px';b.style.opacity='0';if(arrs[i])arrs[i].style.transform='rotate(0deg)';});
      }
      bodies[step].style.maxHeight='400px';bodies[step].style.opacity='1';
      if(arrs[step])arrs[step].style.transform='rotate(180deg)';
      seqGrp.dataset.seqStep=String(step+1);
      return {click(){}};
    }
  }
  return null;
}
document.addEventListener('keydown',e=>{
  if(['ArrowDown','ArrowRight',' ','PageDown'].includes(e.key)){
    e.preventDefault();
    const target=findNextRevealable();
    if(target){target.click();}else{scrollToSlide(cur+1);}
  }
  if(['ArrowUp','ArrowLeft','PageUp'].includes(e.key)){e.preventDefault();scrollToSlide(cur-1);}
  if(e.key==='Home'){e.preventDefault();scrollToSlide(0);}
  if(e.key==='End'){e.preventDefault();scrollToSlide(total-1);}
});
let wlk=false;
document.addEventListener('wheel',e=>{
  if(wlk)return;wlk=true;
  if(e.deltaY>0){const t=findNextRevealable();if(t){t.click();}else{scrollToSlide(cur+1);}}
  else{scrollToSlide(cur-1);}
  setTimeout(()=>wlk=false,850);
},{passive:true});
let tsY=0;
document.addEventListener('touchstart',e=>{tsY=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{const dy=tsY-e.changedTouches[0].clientY;if(Math.abs(dy)>50)scrollToSlide(dy>0?cur+1:cur-1);},{passive:true});
const observer=new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add('is-visible');
      const i=parseInt(entry.target.dataset.index);
      if(!isNaN(i)){cur=i;updateUI();}
    }else{entry.target.classList.remove('is-visible');}
  });
},{threshold:0.5});
slideEls.forEach(el=>observer.observe(el));
updateUI();
// Auto-start music on first interaction (browser autoplay policy)
function bgAutoStart(){
  if(bgMusicOn&&bgAudio.paused){
    const sec=D[cur]?.sec||1;
    bgCurSec=sec;
    const t=bgTracks[sec]||bgTracks[1];
    bgAudio.src=t.url;bgAudio.load();bgAudio.volume=0;
    bgStartPlay();
  }
  document.removeEventListener('keydown',bgAutoStart);
  document.removeEventListener('click',bgAutoStart);
}
document.addEventListener('keydown',bgAutoStart,{once:true});
document.addEventListener('click',bgAutoStart,{once:true});
