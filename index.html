<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大腦作業系統工作坊 · Brain OS Workshop · Vincent</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#111118;--ink:#f0f0f5;--mid:rgba(240,240,245,.55);
  --line:rgba(255,255,255,.08);
  --orange:#FF6B00;--red:#FF2055;--blue:#3B82F6;--purple:#A855F7;
  --green:#22C55E;--yellow:#FBBF24;--cyan:#06B6D4;
  --ease-back:cubic-bezier(0.34,1.56,0.64,1);
  --ease-smooth:cubic-bezier(0.4,0.0,0.2,1);
  --min-font:clamp(1rem,1.5vw,1.2rem);
  --min-label:clamp(.78rem,1.1vw,.9rem);
}
html{font-size:20px}
body{font-family:system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--ink);overflow:hidden;width:100vw;height:100vh}
#slides-container{height:100vh;width:100vw;overflow-y:scroll;scroll-snap-type:y mandatory;scroll-behavior:smooth;position:fixed;inset:0;scrollbar-width:none}
#slides-container::-webkit-scrollbar{display:none}
.slide{height:100vh;width:100%;scroll-snap-align:start;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:clamp(2rem,4vw,4rem) clamp(2rem,5vw,5rem) 68px}
.slide[data-sec="1"]{background:linear-gradient(165deg,#1c1130 0%,#241535 35%,#2c1628 70%,#1e1020 100%)}
.slide[data-sec="2"]{background:linear-gradient(165deg,#0c1830 0%,#112240 35%,#142848 70%,#0c1828 100%)}
.slide[data-sec="3"]{background:linear-gradient(165deg,#0c201a 0%,#102818 35%,#143020 70%,#0c1e14 100%)}
.slide[data-sec="4"]{background:linear-gradient(165deg,#201808 0%,#281e08 35%,#221c10 70%,#180e08 100%)}
.slide[data-sec="5"]{background:linear-gradient(165deg,#16102a 0%,#1e1438 35%,#221840 70%,#14102a 100%)}
.slide[data-sec="6"]{background:linear-gradient(165deg,#0a1a20 0%,#0d2028 35%,#112030 70%,#0a1820 100%)}
.slide::before{content:'';position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:clamp(40px,6vw,72px) clamp(40px,6vw,72px);z-index:0}
.slide::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:0}
.slide[data-sec="1"]::after{background:radial-gradient(ellipse 70% 60% at 15% 15%,rgba(255,32,85,.08),transparent 55%),radial-gradient(ellipse 55% 70% at 85% 85%,rgba(168,85,247,.07),transparent 55%)}
.slide[data-sec="2"]::after{background:radial-gradient(ellipse 70% 60% at 20% 20%,rgba(59,130,246,.08),transparent 55%),radial-gradient(ellipse 55% 70% at 80% 80%,rgba(255,32,85,.06),transparent 55%)}
.slide[data-sec="3"]::after{background:radial-gradient(ellipse 70% 60% at 15% 15%,rgba(34,197,94,.08),transparent 55%),radial-gradient(ellipse 55% 70% at 85% 85%,rgba(6,182,212,.06),transparent 55%)}
.slide[data-sec="4"]::after{background:radial-gradient(ellipse 70% 60% at 20% 20%,rgba(251,191,36,.09),transparent 55%),radial-gradient(ellipse 55% 70% at 80% 80%,rgba(168,85,247,.06),transparent 55%)}
.slide[data-sec="5"]::after{background:radial-gradient(ellipse 70% 60% at 15% 15%,rgba(168,85,247,.1),transparent 55%),radial-gradient(ellipse 55% 70% at 85% 85%,rgba(255,107,0,.07),transparent 55%)}
.slide[data-sec="6"]::after{background:radial-gradient(ellipse 70% 60% at 20% 20%,rgba(6,182,212,.08),transparent 55%),radial-gradient(ellipse 55% 70% at 80% 80%,rgba(34,197,94,.06),transparent 55%)}
.slide.timesup-flash{animation:flashbg 0.6s ease 3}
@keyframes flashbg{0%,100%{filter:brightness(1)}50%{filter:brightness(1.6) saturate(2.5)}}
.slide.timesup-flash::after{background:rgba(255,32,85,.22)!important}
.inner{position:relative;z-index:2;width:min(94vw,1080px);max-height:calc(100vh - 120px);overflow:hidden}
.slide-content{opacity:0;transform:translateY(32px) scale(.97);transition:opacity .6s var(--ease-smooth),transform .6s var(--ease-back)}
.slide.is-visible .slide-content{opacity:1;transform:none}
.slide.is-visible .slide-content>*{animation:fade-up .5s var(--ease-back) both}
.slide.is-visible .slide-content>*:nth-child(1){animation-delay:.04s}
.slide.is-visible .slide-content>*:nth-child(2){animation-delay:.10s}
.slide.is-visible .slide-content>*:nth-child(3){animation-delay:.16s}
.slide.is-visible .slide-content>*:nth-child(4){animation-delay:.22s}
.slide.is-visible .slide-content>*:nth-child(5){animation-delay:.28s}
.slide.is-visible .slide-content>*:nth-child(6){animation-delay:.34s}
@keyframes fade-up{from{opacity:0;transform:translateY(22px) scale(.98)}to{opacity:1;transform:none}}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(300%)}}
/* CHIP */
.chip{display:inline-flex;align-items:center;gap:.4rem;font-size:.65rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;padding:.3em .9em;border-radius:999px;border:1px solid;margin-bottom:.85rem;width:fit-content;white-space:nowrap}
.chip-orange{color:var(--orange);border-color:rgba(255,107,0,.4);background:rgba(255,107,0,.1)}
.chip-red{color:var(--red);border-color:rgba(255,32,85,.4);background:rgba(255,32,85,.1)}
.chip-blue{color:var(--blue);border-color:rgba(59,130,246,.4);background:rgba(59,130,246,.1)}
.chip-purple{color:var(--purple);border-color:rgba(168,85,247,.4);background:rgba(168,85,247,.1)}
.chip-green{color:var(--green);border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.1)}
.chip-yellow{color:var(--yellow);border-color:rgba(251,191,36,.4);background:rgba(251,191,36,.1)}
.chip-cyan{color:var(--cyan);border-color:rgba(6,182,212,.4);background:rgba(6,182,212,.1)}
.chip-white{color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.06)}
/* TYPOGRAPHY */
.hero-txt{font-size:clamp(3.5rem,10vw,8rem);font-weight:800;line-height:1.0;letter-spacing:-0.035em}
h1{font-size:clamp(2.8rem,7vw,5.5rem);font-weight:800;line-height:1.04;letter-spacing:-0.03em}
h2{font-size:clamp(2rem,4vw,3.2rem);font-weight:700;line-height:1.1;letter-spacing:-0.02em;text-wrap:balance}
h3{font-size:clamp(1.4rem,2.2vw,1.8rem);font-weight:600;line-height:1.2;text-wrap:balance}
p,li{font-size:clamp(1.2rem,1.8vw,1.4rem);line-height:1.75;color:var(--mid)}
strong{color:var(--ink);font-weight:700}
.label-sm{font-size:clamp(1rem,1.4vw,1.2rem);color:var(--mid);line-height:1.6}
/* Gradient text */
.g-orange{background:linear-gradient(135deg,#FF6B00,#FF9A00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.g-red{background:linear-gradient(135deg,#FF2055,#FF6080);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.g-blue{background:linear-gradient(135deg,#3B82F6,#60A5FA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.g-purple{background:linear-gradient(135deg,#A855F7,#C084FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.g-green{background:linear-gradient(135deg,#22C55E,#4ADE80);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.g-cyan{background:linear-gradient(135deg,#06B6D4,#22D3EE);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.g-multi{background:linear-gradient(135deg,#FF6B00,#FF2055,#A855F7,#3B82F6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
/* UTIL */
.bar{width:2.8rem;height:3px;background:linear-gradient(90deg,var(--orange),var(--red));border-radius:2px;margin:.6rem 0 1rem}
.tip-box{margin-top:1rem;padding:.9rem 1.4rem;border-left:3px solid var(--orange);border-radius:0 10px 10px 0;background:rgba(255,107,0,.08);font-size:clamp(1rem,1.5vw,1.2rem);color:var(--ink);font-weight:500;line-height:1.6}
.deck-list{list-style:none;margin-top:.85rem;display:flex;flex-direction:column;gap:.6rem}
.deck-list li{padding:.1rem 0 .1rem 1.8rem;position:relative;font-size:clamp(1.1rem,1.6vw,1.3rem);color:var(--mid);line-height:1.65}
.deck-list li::before{content:'▸';position:absolute;left:0;color:var(--orange);font-weight:800}
/* UNLOCK CARDS */
.mrev-grid{display:grid;gap:.9rem;margin-top:1rem}
.mrev-grid.cols-2{grid-template-columns:1fr 1fr}
.mrev-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
.mrev-grid.cols-4{grid-template-columns:1fr 1fr 1fr 1fr}
.unlock-card{position:relative;border-radius:14px;overflow:hidden;cursor:pointer;user-select:none;min-height:140px}
.unlock-card .card-answer{border-radius:14px;padding:1.4rem 1.5rem;height:100%;display:flex;flex-direction:column;gap:.5rem;visibility:hidden}
.unlock-card.unlocked .card-answer{visibility:visible}
.unlock-card .card-mask{position:absolute;inset:0;border-radius:14px;background:#0d0d14;border:1.5px solid rgba(255,255,255,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.6rem;transition:opacity .4s ease,transform .4s var(--ease-back);z-index:2;padding:1rem;text-align:center;overflow:hidden}
.unlock-card .card-mask::after{content:'';position:absolute;top:0;left:-100%;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);animation:shimmer 3s ease-in-out infinite}
.unlock-card.unlocked .card-mask{opacity:0;transform:scale(.88);pointer-events:none}
.unlock-card:not(.unlocked):hover .card-mask{border-color:rgba(255,255,255,.22)}
.unlock-card .card-mask-num{font-size:1.8rem;font-weight:800;color:rgba(255,255,255,.15)}
.unlock-card .card-mask-q{font-size:clamp(1rem,1.4vw,1.15rem);font-weight:600;color:rgba(255,255,255,.55);line-height:1.5;max-width:220px}
.unlock-card .card-mask-hint{font-size:.65rem;color:rgba(255,255,255,.3);letter-spacing:.1em;text-transform:uppercase;margin-top:.2rem}
.unlock-card .card-label{font-size:.65rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;margin-bottom:.2rem}
.unlock-card .card-title{font-size:clamp(1.1rem,1.6vw,1.3rem);font-weight:700;color:var(--ink);line-height:1.3}
.unlock-card .card-body{font-size:clamp(1rem,1.4vw,1.1rem);color:var(--mid);line-height:1.6;margin-top:.3rem}
/* COMPARE */
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin-top:1rem}
.cmp-card{border-radius:14px;padding:1.6rem;border:1.5px solid;position:relative;overflow:hidden}
.cmp-no{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.1)}
.cmp-yes{background:rgba(255,107,0,.07);border-color:rgba(255,107,0,.3)}
/* STEP REVEAL */
.step-reveal-wrap{display:flex;flex-direction:column;gap:.75rem;margin-top:.9rem}
.step-item{border-radius:12px;overflow:hidden;cursor:pointer;user-select:none}
.step-item .step-front{display:flex;align-items:center;gap:1rem;padding:1rem 1.4rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;transition:border-color .2s,background .2s}
.step-item .step-num{font-size:1.1rem;font-weight:800;min-width:1.8rem;flex-shrink:0}
.step-item .step-q{font-size:clamp(1.1rem,1.5vw,1.25rem);font-weight:600;color:var(--ink)}
.step-item .step-lock{font-size:.9rem;margin-left:auto;opacity:.35;transition:opacity .2s,transform .3s}
.step-item .step-back{max-height:0;overflow:hidden;transition:max-height .42s var(--ease-smooth),opacity .32s ease;opacity:0;background:rgba(255,107,0,.06);border-radius:0 0 12px 12px}
.step-item.open .step-front{border-color:rgba(255,107,0,.4);background:rgba(255,107,0,.08);border-radius:12px 12px 0 0}
.step-item.open .step-lock{opacity:0;transform:rotate(90deg)}
.step-item.open .step-back{max-height:200px;opacity:1}
.step-item:not(.open):hover .step-front{border-color:rgba(255,255,255,.18)}
.step-back-inner{padding:.85rem 1.4rem 1.1rem;font-size:clamp(1rem,1.45vw,1.15rem);color:rgba(255,255,255,.82);line-height:1.7}
.step-back-inner strong{color:var(--orange)}
/* TIMER */
.timer-wrap{display:flex;flex-direction:column;align-items:center;gap:1.4rem;margin-top:1.4rem}
.timer-display{font-size:clamp(6rem,18vw,12rem);font-weight:800;letter-spacing:-.04em;font-variant-numeric:tabular-nums;line-height:1;background:linear-gradient(135deg,var(--orange),var(--red));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;transition:all .3s}
.timer-display.done{background:linear-gradient(135deg,var(--red),#ff6080);-webkit-background-clip:text;background-clip:text;animation:done-pulse .5s ease infinite alternate}
@keyframes done-pulse{from{filter:brightness(1)}to{filter:brightness(1.4)}}
.timer-label-done{font-size:clamp(1.6rem,3vw,2.4rem);font-weight:800;color:var(--red);letter-spacing:.12em;text-transform:uppercase;animation:done-pulse .5s ease infinite alternate;display:none}
.timer-label-done.show{display:block}
.timer-btns{display:flex;gap:1.2rem;align-items:center}
.timer-btn{background:linear-gradient(135deg,var(--orange),var(--red));color:#fff;border:none;border-radius:10px;padding:.85rem 2.8rem;font-size:1.1rem;font-weight:700;cursor:pointer;letter-spacing:.06em;transition:opacity .2s,transform .15s}
.timer-btn:hover{opacity:.85;transform:scale(1.04)}
.timer-btn.paused{background:linear-gradient(135deg,var(--green),#16a34a)}
.timer-reset-btn{background:transparent;color:var(--mid);border:1.5px solid var(--line);border-radius:10px;padding:.85rem 2rem;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s}
.timer-reset-btn:hover{border-color:var(--orange);color:var(--orange)}
.sprint-task{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.1);border-radius:14px;padding:1.2rem 1.8rem;margin-top:1rem;font-size:clamp(1.1rem,1.7vw,1.35rem);color:var(--ink);line-height:1.6;text-align:center;max-width:700px;width:100%}
/* CAROUSEL (from v3) */
.carousel-wrap{position:relative;width:min(480px,78vw);aspect-ratio:16/10;border-radius:16px;overflow:hidden;border:2px solid rgba(255,255,255,.12);box-shadow:0 20px 60px rgba(0,0,0,.5)}
.carousel-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .8s ease}
.carousel-wrap img.active{opacity:1}
.carousel-dots{display:flex;gap:.5rem;margin-top:.8rem}
.carousel-dots span{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer;transition:all .3s}
.carousel-dots span.active{background:var(--orange);transform:scale(1.2)}
/* TRIAD V2 (from v3) */
.triad-wrap{display:flex;align-items:stretch;gap:1rem;margin-top:1.1rem;flex-wrap:nowrap}
.triad-orb{flex:1;border-radius:16px;border:1.5px solid;cursor:pointer;user-select:none;overflow:hidden;transition:transform .3s var(--ease-back),box-shadow .35s ease,border-color .3s ease}
.triad-orb:not(.to-open):hover{transform:translateY(-4px)}
.triad-orb.to-open{transform:translateY(-3px)}
.triad-orb-front{padding:1.6rem 1.3rem 1.3rem;display:flex;flex-direction:column;align-items:center;text-align:center;gap:.6rem}
.triad-orb-circle{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto .15rem;position:relative;flex-shrink:0;transition:box-shadow .35s ease}
.triad-orb.to-open .triad-orb-circle{box-shadow:0 0 28px rgba(255,255,255,.1)}
.triad-detail{max-height:0;overflow:hidden;transition:max-height .45s var(--ease-smooth),opacity .32s ease;opacity:0;border-top:1px solid rgba(255,255,255,.07)}
.triad-orb.to-open .triad-detail{max-height:420px;opacity:1}
.triad-detail-inner{padding:1rem 1.3rem 1.2rem;display:flex;flex-direction:column;gap:.6rem}
.triad-det-txt{font-size:clamp(.78rem,1.25vw,.88rem);line-height:1.68;color:rgba(255,255,255,.78)}
.triad-det-txt strong{color:var(--ink)}
/* FUNNEL */
.funnel-layer{cursor:pointer;transition:opacity .3s}
.funnel-layer.dim{opacity:.25}
/* FIXED CHROME */
#prog{position:fixed;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,.06);z-index:900}
#prog-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--red),var(--purple));transition:width .4s ease;width:0%}
#breadcrumb{position:fixed;top:3px;left:50%;transform:translateX(-50%);font-size:.62rem;font-weight:700;letter-spacing:.1em;color:rgba(255,255,255,.45);background:rgba(15,15,20,.92);backdrop-filter:blur(12px);padding:.22rem .85rem;border-radius:0 0 8px 8px;z-index:901;white-space:nowrap;border:1px solid var(--line);border-top:none;text-transform:uppercase}
#sec-indicator{position:fixed;top:14px;right:18px;z-index:910;padding:.35rem .95rem;border-radius:999px;font-size:.7rem;font-weight:700;color:rgba(255,255,255,.75);background:rgba(255,255,255,.07);backdrop-filter:blur(12px);border:1px solid var(--line);transition:all .25s;letter-spacing:.06em;text-transform:uppercase}
#dot-nav{position:fixed;right:18px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:5px;z-index:900;max-height:80vh;overflow-y:auto;scrollbar-width:none}
#dot-nav::-webkit-scrollbar{display:none}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.18);transition:all .25s;cursor:pointer;flex-shrink:0}
.dot.active{background:var(--orange);transform:scale(1.6)}
.dot.same-sec{background:rgba(255,107,0,.35)}
.nav-btn{position:fixed;z-index:900;width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.07);backdrop-filter:blur(12px);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;color:rgba(255,255,255,.6);transition:all .25s var(--ease-back)}
.nav-btn:hover{transform:scale(1.12);color:var(--orange);border-color:rgba(255,107,0,.4)}
#btn-prev{bottom:72px;right:72px}
#btn-next{bottom:72px;right:18px}
#counter{position:fixed;bottom:80px;left:20px;z-index:900;font-size:1.6rem;font-weight:800;color:#fff;letter-spacing:.04em;font-variant-numeric:tabular-nums;text-shadow:0 2px 12px rgba(0,0,0,.7)}
#sec-nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(8,8,12,.95);backdrop-filter:blur(20px);display:flex;align-items:stretch;z-index:950;border-top:1px solid var(--line)}
.sec-btn{flex:1;display:flex;align-items:center;justify-content:center;font-size:clamp(.58rem,.85vw,.75rem);font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:rgba(255,255,255,.3);cursor:pointer;border:none;background:transparent;border-right:1px solid var(--line);transition:color .2s,background .2s;border-top:2px solid transparent}
.sec-btn:last-child{border-right:none}
.sec-btn:hover{color:rgba(255,255,255,.8);background:rgba(255,107,0,.08)}
.sec-btn.active{color:#fff;background:rgba(255,107,0,.1);border-top-color:var(--orange)}
/* GLASS CARD */
.glass-card{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.1);border-radius:16px;padding:1.5rem 1.8rem;backdrop-filter:blur(8px)}
.glass-card:hover{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.06)}
/* HOT SEAT */
.hotseat-badge{display:inline-flex;align-items:center;gap:.5rem;background:linear-gradient(135deg,rgba(255,32,85,.2),rgba(255,107,0,.15));border:2px solid rgba(255,32,85,.5);border-radius:12px;padding:.6rem 1.4rem;font-size:clamp(1rem,1.5vw,1.2rem);font-weight:800;color:var(--red);letter-spacing:.08em;text-transform:uppercase}
/* BIG NUMBER */
.big-num{font-size:clamp(4rem,12vw,9rem);font-weight:800;line-height:1;letter-spacing:-.04em}
/* SPRINT BADGE */
.sprint-badge{display:inline-flex;align-items:center;gap:.5rem;background:linear-gradient(135deg,rgba(255,32,85,.15),rgba(255,107,0,.1));border:2px solid rgba(255,32,85,.45);border-radius:999px;padding:.45rem 1.2rem;font-size:.72rem;font-weight:800;color:var(--red);letter-spacing:.14em;text-transform:uppercase;margin-bottom:1rem}
/* CTA BUTTON */
.cta-btn{display:inline-flex;align-items:center;gap:.6rem;background:linear-gradient(135deg,rgba(255,107,0,.15),rgba(168,85,247,.1));border:1.5px solid rgba(255,107,0,.4);color:var(--orange);border-radius:12px;padding:.75rem 1.8rem;font-size:clamp(1rem,1.4vw,1.15rem);font-weight:700;cursor:pointer;letter-spacing:.06em;transition:all .25s}
.cta-btn:hover{background:linear-gradient(135deg,rgba(255,107,0,.28),rgba(168,85,247,.18));transform:scale(1.03)}
/* Mobile */
@media(max-width:767px){

// ── TIMER STATE ───────────────────────────────────────────────────────────
const timers={};
function fmt(s){const m=Math.floor(s/60),sec=s%60;return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`}
function toggleTimer(id,total){
  const t=timers[id];if(!t)return;
  if(t.running){
    clearInterval(t.interval);t.running=false;
    const btn=document.getElementById('tbtn-'+id);
    if(btn){btn.textContent='繼續';btn.classList.add('paused');}
  }else{
    t.running=true;
    const btn=document.getElementById('tbtn-'+id);
    if(btn){btn.textContent='暫停';btn.classList.remove('paused');}
    t.interval=setInterval(()=>{
      t.rem--;
      const disp=document.getElementById('td-'+id);
      if(disp)disp.textContent=fmt(t.rem);
      if(t.rem<=0){
        clearInterval(t.interval);t.running=false;
        if(disp){disp.textContent='00:00';disp.classList.add('done');}
        const lbl=document.getElementById('tlbl-'+id);if(lbl)lbl.classList.add('show');
        const b=document.getElementById('tbtn-'+id);if(b){b.textContent='結束';b.disabled=true;}
        const slideEl=document.querySelector(`.slide[data-index="${cur}"]`);
        if(slideEl){slideEl.classList.add('timesup-flash');setTimeout(()=>slideEl.classList.remove('timesup-flash'),2200);}
      }
    },1000);
  }
}
function resetTimer(id,total){
  const t=timers[id];if(!t)return;
  clearInterval(t.interval);t.running=false;t.rem=total;
  const disp=document.getElementById('td-'+id);if(disp){disp.textContent=fmt(total);disp.classList.remove('done');}
  const lbl=document.getElementById('tlbl-'+id);if(lbl)lbl.classList.remove('show');
  const btn=document.getElementById('tbtn-'+id);if(btn){btn.textContent='開始';btn.disabled=false;btn.classList.remove('paused');}
}

// ── CAROUSEL (from v3) ────────────────────────────────────────────────────
const carouselTimers={};
function carouselGo(id,idx){
  const wrap=document.getElementById(id);const dots=document.getElementById(id+'-dots');
  if(!wrap)return;
  wrap.querySelectorAll('img').forEach((img,i)=>{img.classList.toggle('active',i===idx);});
  if(dots)dots.querySelectorAll('span').forEach((dot,i)=>{dot.classList.toggle('active',i===idx);});
}
function startCarousel(id,count){
  if(carouselTimers[id])return;
  let idx=0;
  carouselTimers[id]=setInterval(()=>{idx=(idx+1)%count;carouselGo(id,idx);},3500);
}
function initCarousels(){
  document.querySelectorAll('.carousel-wrap').forEach(wrap=>{
    const id=wrap.id;const count=wrap.querySelectorAll('img').length;
    if(count>1)startCarousel(id,count);
  });
}

// ── TRIAD TOGGLE (from v3) ────────────────────────────────────────────────
function triadToggle(uid){
  const el=document.getElementById(uid);if(!el)return;
  const wasOpen=el.classList.contains('to-open');
  if(wasOpen){el.classList.remove('to-open');el.style.boxShadow='';}
  else{el.classList.add('to-open');const g=el.dataset.glow||'rgba(255,255,255,.15)';el.style.boxShadow=`0 0 36px ${g},0 8px 24px rgba(0,0,0,.35)`;}
}

function funnelFocus(fid,key){
  const svg=document.getElementById('funnel-'+fid);const box=document.getElementById('fd-'+fid);
  if(!svg||!box)return;
  ['p','i','h'].forEach(k=>{const el=svg.querySelector('#fl-'+k+'-'+fid);if(el)el.classList.toggle('dim',k!==key);});
  const d=funnelData[key];
  if(d){box.style.borderColor=d.col;box.innerHTML=d.text;box.style.opacity='1';}
}

        h+=`<div onclick="funnelFocus('${fid}','${row.key}')" style="cursor:pointer;background:rgba(255,255,255,.04);border-left:3px solid ${row.col};border-radius:0 8px 8px 0;padding:.6rem 1rem;transition:background .2s" onmouseover="this.style.background='rgba(255,255,255,.07)'" onmouseout="this.style.background='rgba(255,255,255,.04)'">`;
        h+=`<div style="font-size:.6rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:${row.col};margin-bottom:.2rem">${row.sub}</div>`;
        h+=`<div style="font-weight:700;color:var(--ink);font-size:clamp(.95rem,1.4vw,1.1rem)">${row.label}</div>`;
        h+=`</div>`;
      });
      h+=`</div></div>`;
      h+=`<div id="fd-${fid}" style="margin-top:.8rem;padding:.75rem 1.2rem;border-radius:8px;border-left:3px solid var(--orange);background:rgba(255,107,0,.08);font-size:clamp(1rem,1.4vw,1.1rem);color:var(--ink);transition:opacity .3s;opacity:0">點擊漏斗層查看說明</div>`;
      h+=`<div class="tip-box" style="margin-top:1rem">漏斗越窄，執行力越強。專注不是天賦，是主動過濾的結果。</div>`;
      h+=`</div>`;
      break;

    // ── RECAP ─────────────────────────────────────────
    case 'recap':
      h+=blob('rgba(6,182,212,.08)','rgba(34,197,94,.06)');
      h+=`<div style="position:relative;z-index:1;max-width:920px;width:100%">`;
      h+=chip('全場回顧','cyan');
      h+=`<h2 style="margin-bottom:.5rem">90 分鐘<span class="g-cyan">大腦作業系統</span>總覽</h2>`;
      h+=`<div class="bar"></div>`;
      h+=`<div class="mrev-grid cols-3" style="margin-top:1rem">`;
      [{num:'01',title:'學習基礎',points:['降噪環境','身體三角形','Input → Output 迴路'],col:'var(--blue)',colR:'rgba(59,130,246'},{num:'02',title:'記憶留存',points:['重要性標記','雙重編碼','費曼技巧 + 間隔重複'],col:'var(--green)',colR:'rgba(34,197,94'},{num:'03',title:'速讀獲取',points:['問題先行','三段掃描法','破除默念迷思'],col:'var(--yellow)',colR:'rgba(251,191,36'},{num:'04',title:'策略思維',points:['Signal vs Noise','Unfair Advantage','MECE 資源漏斗'],col:'var(--purple)',colR:'rgba(168,85,247'},{num:'05',title:'底層原則',points:['Signal over Noise','在你的主場作戰','今天只做一件事'],col:'var(--red)',colR:'rgba(255,32,85'},{num:'06',title:'你的下一步',points:['用框架看你的問題','找出最高槓桿行動','明天就開始一件事'],col:'var(--cyan)',colR:'rgba(6,182,212'}].forEach(item=>{
        h+=`<div style="background:${item.colR},.07);border:1.5px solid ${item.colR},.25);border-radius:14px;padding:1.2rem">`;
        h+=`<div style="font-size:1.4rem;font-weight:800;color:${item.colR},.25);margin-bottom:.4rem">${item.num}</div>`;
        h+=`<div style="font-size:clamp(1rem,1.4vw,1.2rem);font-weight:700;color:${item.col};margin-bottom:.6rem">${item.title}</div>`;
        h+=`<ul class="deck-list">`;
        item.points.forEach(p=>{h+=`<li style="font-size:clamp(.9rem,1.3vw,1.05rem)">${p}</li>`;});
        h+=`</ul></div>`;
      });
      h+=`</div></div>`;
      break;

    // ── HOT SEAT SESSION ──────────────────────────────
    case 'hotseat-session':
      h+=blob('rgba(255,32,85,.12)','rgba(255,107,0,.08)');
      h+=`<div style="position:relative;z-index:1;text-align:center;max-width:800px">`;
      h+=`<div class="hotseat-badge" style="margin:0 auto 1.2rem">全場 Hot Seat</div>`;
      h+=`<h1 class="g-red" style="margin-bottom:1rem">壓力測試時間</h1>`;
      h+=`<div class="bar" style="margin:.8rem auto 1.4rem"></div>`;
      h+=`<div style="background:rgba(255,32,85,.08);border:2px solid rgba(255,32,85,.3);border-radius:16px;padding:1.6rem;margin-bottom:1.2rem">`;
      h+=`<p style="font-size:clamp(1.2rem,1.8vw,1.5rem);color:var(--ink);line-height:1.8">被點到的學員：<br>用<strong style="color:var(--red)">今天學到的框架</strong><br>分析你在 Module 1 寫下的<strong style="color:var(--orange)">卡關問題</strong><br><span style="opacity:.6;font-size:.9em">2 分鐘，說出你的診斷</span></p>`;
      h+=`</div>`;
      h+=`<div style="display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap">`;
      ['學習環境有哪些噪音？','用了哪個記憶策略？','資源漏斗怎麼切？','你的 Signal 是什麼？'].forEach(q=>{
        h+=`<div style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:.6rem 1rem;font-size:clamp(.9rem,1.3vw,1.1rem);color:rgba(255,255,255,.6)">${q}</div>`;
      });
      h+=`</div></div>`;
      break;

    // ── CONVERGE ──────────────────────────────────────
    case 'converge':
      h+=blob('rgba(6,182,212,.08)','rgba(34,197,94,.06)');
      h+=`<div style="position:relative;z-index:1;max-width:820px">`;
      h+=chip('終極收斂','cyan');
      h+=`<h1 style="margin-bottom:1rem">把混亂說清楚<br>就看見<span class="g-cyan">真正的下一步</span></h1>`;
      h+=`<div class="bar"></div>`;
      h+=`<div style="display:flex;flex-direction:column;gap:1rem;margin-top:1rem">`;
      [['01','現在，看看你 Module 1 寫下的問題'],['02','用 MECE 漏斗分類你的可用行動'],['03','找出你的 Unfair Advantage 在哪裡'],['04','寫下：明天第一件要做的事（一件）']].forEach(([num,text])=>{
        h+=`<div class="glass-card" style="display:flex;align-items:center;gap:1.2rem">`;
        h+=`<span style="font-size:1.4rem;font-weight:800;color:rgba(6,182,212,.4);flex-shrink:0;min-width:2rem">${num}</span>`;
        h+=`<span style="font-size:clamp(1.1rem,1.6vw,1.3rem);color:var(--ink)">${text}</span>`;
        h+=`</div>`;
      });
      h+=`</div>`;
      h+=`<div class="tip-box" style="margin-top:1.2rem">混亂不是因為事情太複雜。是因為<strong>你還沒有過濾</strong>。現在，過濾它。</div>`;
      h+=`<div style="text-align:center;margin-top:1.4rem">`;
      h+=`<button class="cta-btn" onclick="jumpToId('m1_cover')" style="font-size:clamp(.9rem,1.3vw,1.1rem)">← 返回開頭</button>`;
      h+=`</div></div>`;
      break;

    // ── CTA ───────────────────────────────────────────
    case 'cta':
      h+=blob('rgba(255,107,0,.1)','rgba(168,85,247,.08)');
      h+=`<div style="position:relative;z-index:1;text-align:center;max-width:800px">`;
      h+=chip('後續連結','orange');
      h+=`<h1 class="g-multi" style="margin-bottom:1rem">繼續對話</h1>`;
      h+=`<div class="bar" style="margin:.8rem auto 1.4rem"></div>`;
      h+=`<p style="font-size:clamp(1.2rem,1.8vw,1.5rem);margin-bottom:1.8rem">今天是起點，不是終點。<br>有問題、有想法、想深聊——歡迎隨時找我。</p>`;
      h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin-bottom:1.8rem;text-align:left">`;
      [['01','後續策略對接','有具體問題想深聊，歡迎直接聯繫'],['02','資源與工具','今天提到的工具清單會整理後分享'],['03','社群連結','加入持續學習的社群，保持校準'],['04','書單推薦','今天框架的延伸閱讀，精選5本']].forEach(([num,title,desc])=>{
        h+=`<div class="glass-card"><div style="font-size:.65rem;font-weight:800;letter-spacing:.14em;color:var(--orange);margin-bottom:.4rem">${num}</div><div style="font-size:clamp(1rem,1.4vw,1.2rem);font-weight:700;color:var(--ink);margin-bottom:.3rem">${title}</div><div class="label-sm">${desc}</div></div>`;
      });
      h+=`</div>`;
      h+=`<div style="background:linear-gradient(135deg,rgba(255,107,0,.1),rgba(168,85,247,.08));border:2px solid rgba(255,107,0,.3);border-radius:16px;padding:1.4rem;margin-bottom:1.4rem">`;
      h+=`<div style="font-size:clamp(1.4rem,2.2vw,1.8rem);font-weight:700;color:var(--ink)">Signal over Noise.</div>`;
      h+=`<div style="font-size:clamp(1rem,1.5vw,1.2rem);color:var(--mid);margin-top:.5rem">每一天，都是過濾的練習。</div>`;
      h+=`</div>`;
      h+=`<button class="cta-btn" onclick="jumpToId('m1_cover')" style="font-size:clamp(.9rem,1.3vw,1.1rem)">← 返回開頭</button>`;
      h+=`</div>`;
      break;

    // ── SPRINT ────────────────────────────────────────
    case 'sprint':
      const sid=sd.id;
      timers[sid]={rem:sd.time,running:false,interval:null};
      h+=blob('rgba(255,32,85,.12)','rgba(255,107,0,.1)');
      h+=`<div style="position:relative;z-index:1;text-align:center;max-width:820px;width:100%">`;
      h+=`<div class="sprint-badge">Sprint ${sd.sprintNum} · 實戰衝刺</div>`;
      h+=`<h2 style="margin-bottom:.8rem">${sd.title}</h2>`;
      h+=`<div class="sprint-task">${sd.task}</div>`;
      h+=`<div class="timer-wrap">`;
      h+=`<div class="timer-display" id="td-${sid}">${fmt(sd.time)}</div>`;
      h+=`<div id="tlbl-${sid}" class="timer-label-done">TIME IS UP</div>`;
      h+=`<div class="timer-btns">`;
      h+=`<button class="timer-btn" id="tbtn-${sid}" onclick="toggleTimer('${sid}',${sd.time})">開始</button>`;
      h+=`<button class="timer-reset-btn" onclick="resetTimer('${sid}',${sd.time})">重設</button>`;
      h+=`</div></div></div>`;
      break;

    default:
      h+=`<div style="position:relative;z-index:1"><h2>${sd.id}</h2></div>`;
  }
  h+='</div>';
  return h;
}

// ── TOGGLE STEP ───────────────────────────────────────────────────────────
function toggleStep(id){const el=document.getElementById(id);if(!el)return;el.classList.toggle('open');}

// ── NAVIGATION ENGINE ─────────────────────────────────────────────────────
let cur=0;
const total=D.length;
const container=document.getElementById('slides-container');
const secStarts={};
D.forEach((sd,i)=>{if(secStarts[sd.sec]===undefined)secStarts[sd.sec]=i;});

const slideEls=D.map((sd,i)=>{
  const el=document.createElement('div');
  el.className='slide';
  el.dataset.sec=sd.sec;
  el.dataset.index=i;
  el.innerHTML=renderSlide(sd);
  container.appendChild(el);
  return el;
});

// Dot nav
const dotNav=document.getElementById('dot-nav');
D.forEach((sd,i)=>{
  const d=document.createElement('div');
  d.className='dot';d.dataset.idx=i;
  d.title=`${i+1}. ${sd.sub}`;
  d.onclick=()=>scrollToSlide(i);
  dotNav.appendChild(d);
});

function updateUI(){
  const sd=D[cur];
  document.getElementById('prog-fill').style.width=`${(cur/(total-1))*100}%`;
  document.getElementById('breadcrumb').textContent=`Module ${sd.sec} · ${sd.sub}`;
  document.getElementById('sec-indicator').textContent=`${'①②③④⑤⑥'[sd.sec-1]} ${['開場','學習基礎','記憶留存','速讀獲取','策略思維','收尾驗收'][sd.sec-1]}`;
  document.getElementById('counter').textContent=`${cur+1} / ${total}`;
  document.querySelectorAll('.sec-btn').forEach(btn=>{btn.classList.toggle('active',parseInt(btn.dataset.sec)===sd.sec);});
  document.querySelectorAll('.dot').forEach(d=>{
    const i=parseInt(d.dataset.idx);
    d.classList.toggle('active',i===cur);
    d.classList.toggle('same-sec',D[i].sec===sd.sec&&i!==cur);
  });
}

function scrollToSlide(idx){
  idx=Math.max(0,Math.min(idx,total-1));
  slideEls[idx]?.scrollIntoView({behavior:'smooth',block:'start'});
  cur=idx;updateUI();
}
function jumpToSection(sec){const idx=secStarts[sec];if(idx!==undefined)scrollToSlide(idx);}
function jumpToId(id){const idx=D.findIndex(sd=>sd.id===id);if(idx>=0)scrollToSlide(idx);}

function findNextRevealable(){
  const slideEl=document.querySelector(`.slide[data-index="${cur}"]`);if(!slideEl)return null;
  const card=slideEl.querySelector('.unlock-card:not(.unlocked)');if(card)return card;
  const stepItem=slideEl.querySelector('.step-item:not(.open)');if(stepItem)return stepItem;
  return null;
}

document.getElementById('btn-prev').addEventListener('click',()=>scrollToSlide(cur-1));
document.getElementById('btn-next').addEventListener('click',()=>{const t=findNextRevealable();if(t){t.click();}else{scrollToSlide(cur+1);}});

document.addEventListener('keydown',e=>{
  if(['ArrowDown','ArrowRight',' ','PageDown'].includes(e.key)){e.preventDefault();const t=findNextRevealable();if(t){t.click();}else{scrollToSlide(cur+1);}}
  if(['ArrowUp','ArrowLeft','PageUp'].includes(e.key)){e.preventDefault();scrollToSlide(cur-1);}
  if(e.key==='Home'){e.preventDefault();scrollToSlide(0);}
  if(e.key==='End'){e.preventDefault();scrollToSlide(total-1);}
});

let wlk=false;
document.addEventListener('wheel',e=>{if(wlk)return;wlk=true;scrollToSlide(e.deltaY>0?cur+1:cur-1);setTimeout(()=>wlk=false,850);},{passive:true});
let tsY=0;
document.addEventListener('touchstart',e=>{tsY=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{const dy=tsY-e.changedTouches[0].clientY;if(Math.abs(dy)>50)scrollToSlide(dy>0?cur+1:cur-1);},{passive:true});

const observer=new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add('is-visible');
      const i=parseInt(entry.target.dataset.index);
      if(!isNaN(i)){cur=i;updateUI();}
    }else{entry.target.classList.remove('is-visible');}
  });
},{threshold:0.5});
slideEls.forEach(el=>observer.observe(el));
updateUI();
initCarousels();
</script>
</body>
</html>
